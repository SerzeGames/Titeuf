<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Titeuf - Ze Gag Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    /* Prevent mobile browsers from intercepting touch as scroll/zoom */
    touch-action: none;
    -ms-touch-action: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    overscroll-behavior: none;
    position: fixed;
    inset: 0;
}
canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
    cursor: none;
    touch-action: none;
}
#loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1a0a2e;
    color: #ffd700;
    font-family: 'Comic Sans MS', cursive;
    font-size: 28px;
    z-index: 100;
    transition: opacity 0.5s;
}
#loading .bar-bg {
    width: 300px; height: 20px;
    background: #2a1a3e; border-radius: 10px;
    margin-top: 20px; overflow: hidden;
}
#loading .bar-fill {
    width: 0%; height: 100%;
    background: linear-gradient(90deg, #ff6b35, #ffd700);
    border-radius: 10px;
    transition: width 0.3s;
}
#nicknameModal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-family: "Comic Sans MS", cursive, sans-serif;
}
#nicknameModal .panel {
    background: #f4c41e;
    border: 6px solid #5a2a8c;
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    min-width: 320px;
}
#nicknameModal h2 {
    color: #5a2a8c;
    margin: 0 0 16px 0;
    font-size: 28px;
}
#nicknameModal input {
    width: 100%;
    box-sizing: border-box;
    font-size: 22px;
    padding: 10px 14px;
    border: 3px solid #5a2a8c;
    border-radius: 8px;
    background: #fff8d8;
    color: #3a1850;
    outline: none;
    font-family: inherit;
}
#nicknameModal button {
    margin-top: 18px;
    font-size: 22px;
    padding: 10px 30px;
    background: #5a2a8c;
    color: #f4c41e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
}
#nicknameModal button:hover {
    background: #7a3aac;
}
#nicknameModal .error {
    color: #c00;
    margin-top: 10px;
    font-size: 14px;
    min-height: 18px;
}
</style>
</head>
<body>
<div id="loading">
    <div>Chargement de Titeuf...</div>
    <div class="bar-bg"><div class="bar-fill" id="loadBar"></div></div>
</div>
<canvas id="game"></canvas>
<div id="nicknameModal">
    <div class="panel">
        <h2>TON PSEUDO</h2>
        <input id="nicknameInput" type="text" maxlength="14" placeholder="Titeuf" autocomplete="off" />
        <div class="error" id="nicknameError"></div>
        <button id="nicknameOk">RECHERCHE RAPIDE</button>
    </div>
</div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(() => {
    'use strict';

    // ========== CONFIG ==========
    const CONFIG = {
        // Map (drawn at half scale in world space)
        MAP_SCALE: 0.5,
        MAP_W: 1536 * 0.5,  // 768
        MAP_H: 1024 * 0.5,  // 512
        // Sprite sheets: all 256x128, grid 4 cols x 2 rows, cells 64x64
        SPRITE_COLS: 4,
        SPRITE_CELL_W: 64,
        SPRITE_CELL_H: 64,
        // Player
        PLAYER_SCALE: 1.8,
        PLAYER_SPEED: 4.0,
        ANIM_SPEED: 0.13,
        // Camera
        CAMERA_ZOOM: 3.4,
        CAMERA_LERP: 0.08,
        // Collision
        PLAYER_HITBOX: { w: 45, h: 20, offsetY: 18 },
    };

    const S = CONFIG.MAP_SCALE;
    const P_RENDER_W = CONFIG.SPRITE_CELL_W * CONFIG.PLAYER_SCALE;
    const P_RENDER_H = CONFIG.SPRITE_CELL_H * CONFIG.PLAYER_SCALE;

    // ========== COLLISION RECTS ==========
    const COLLIDERS = [
        { x: 0, y: 0, w: CONFIG.MAP_W, h: 80 },
        { x: 0, y: 0, w: 5, h: CONFIG.MAP_H },
        { x: CONFIG.MAP_W - 5, y: 0, w: 5, h: CONFIG.MAP_H },
        { x: 0, y: CONFIG.MAP_H - 5, w: CONFIG.MAP_W, h: 5 },
        { x: 36, y: 55, w: 78, h: 40 },
        { x: 545, y: 55, w: 78, h: 40 },
        { x: 650, y: 55, w: 78, h: 40 },
        { x: 320, y: 100, w: 100, h: 60 },
        { x: 115, y: 164, w: 130, h: 71 },
        { x: 500, y: 164, w: 145, h: 71 },
        { x: 100, y: 340, w: 165, h: 70 },
        { x: 480, y: 340, w: 165, h: 70 },
    ];

    // Colliders for the kitchen map. Same world size (768x512) as the classroom.
    const COLLIDERS_CUISINE = [
        // Outer walls (purple frame)
        { x: 0, y: 0, w: CONFIG.MAP_W, h: 120 },                  // entire top wall (under ceiling)
        { x: 0, y: 0, w: 18, h: CONFIG.MAP_H },                   // left wall
        { x: CONFIG.MAP_W - 18, y: 0, w: 18, h: CONFIG.MAP_H },   // right wall
        { x: 0, y: CONFIG.MAP_H - 18, w: CONFIG.MAP_W, h: 18 },   // bottom wall

        // Furniture / counters that extend further down into the floor:
        // Left cabinets (yellow tall cabinet)
        { x: 130, y: 110, w: 110, h: 55 },
        // Central sink + cabinets block
        { x: 265, y: 110, w: 175, h: 55 },
        // Right cabinets block
        { x: 535, y: 110, w: 185, h: 55 },

        // Round table + chair on the right
        { x: 585, y: 210, w: 145, h: 105 },
    ];

    // Active map ('classe' for gameplay, 'cuisine' for post-victory exploration).
    // The collision/render code below reads `currentColliders` and `currentMapImg`.
    let currentMap = 'classe';
    function getCurrentColliders() {
        return currentMap === 'cuisine' ? COLLIDERS_CUISINE : COLLIDERS;
    }

    // ========== NAVIGATION GRID & A* PATHFINDING ==========
    // The grid marks cells as walkable or blocked. We inflate colliders by an NPC
    // hitbox margin so the path keeps a safe distance from corners.
    const NAV_CELL = 12;          // grid resolution in world pixels
    const NAV_INFLATE = 18;       // expand obstacles by this much (~half NPC hitbox)
    const NAV_COLS = Math.ceil(CONFIG.MAP_W / NAV_CELL);
    const NAV_ROWS = Math.ceil(CONFIG.MAP_H / NAV_CELL);
    const navGrid_classe = new Uint8Array(NAV_COLS * NAV_ROWS); // 0=walkable, 1=blocked
    const navGrid_cuisine = new Uint8Array(NAV_COLS * NAV_ROWS);
    // Pointer to the active grid (reassigned when map changes)
    let navGrid = navGrid_classe;

    function buildNavGridFor(grid, colliders) {
        for (let r = 0; r < NAV_ROWS; r++) {
            for (let c = 0; c < NAV_COLS; c++) {
                const cx = c * NAV_CELL + NAV_CELL / 2;
                const cy = r * NAV_CELL + NAV_CELL / 2;
                let blocked = false;
                for (const col of colliders) {
                    if (cx > col.x - NAV_INFLATE && cx < col.x + col.w + NAV_INFLATE &&
                        cy > col.y - NAV_INFLATE && cy < col.y + col.h + NAV_INFLATE) {
                        blocked = true; break;
                    }
                }
                grid[r * NAV_COLS + c] = blocked ? 1 : 0;
            }
        }
    }
    // Build both grids once (colliders never change at runtime)
    buildNavGridFor(navGrid_classe, COLLIDERS);
    buildNavGridFor(navGrid_cuisine, COLLIDERS_CUISINE);

    function navIsWalkable(c, r) {
        if (c < 0 || c >= NAV_COLS || r < 0 || r >= NAV_ROWS) return false;
        return navGrid[r * NAV_COLS + c] === 0;
    }

    function worldToGrid(x, y) {
        return { c: Math.floor(x / NAV_CELL), r: Math.floor(y / NAV_CELL) };
    }
    function gridToWorld(c, r) {
        return { x: c * NAV_CELL + NAV_CELL / 2, y: r * NAV_CELL + NAV_CELL / 2 };
    }

    // Find nearest walkable cell (used when start or end is inside an obstacle)
    function nearestWalkable(c, r) {
        if (navIsWalkable(c, r)) return { c, r };
        for (let radius = 1; radius < 12; radius++) {
            for (let dr = -radius; dr <= radius; dr++) {
                for (let dc = -radius; dc <= radius; dc++) {
                    if (Math.abs(dr) !== radius && Math.abs(dc) !== radius) continue;
                    if (navIsWalkable(c + dc, r + dr)) return { c: c + dc, r: r + dr };
                }
            }
        }
        return null;
    }

    // A* pathfinding. Returns array of {x, y} world points, or null if no path.
    function findPath(startX, startY, endX, endY) {
        const start = worldToGrid(startX, startY);
        const end = worldToGrid(endX, endY);
        const ws = nearestWalkable(start.c, start.r);
        const we = nearestWalkable(end.c, end.r);
        if (!ws || !we) return null;

        const startKey = ws.r * NAV_COLS + ws.c;
        const endKey = we.r * NAV_COLS + we.c;
        if (startKey === endKey) return [{ x: endX, y: endY }];

        // 8-directional moves
        const moves = [
            { dc: 1, dr: 0, cost: 10 }, { dc: -1, dr: 0, cost: 10 },
            { dc: 0, dr: 1, cost: 10 }, { dc: 0, dr: -1, cost: 10 },
            { dc: 1, dr: 1, cost: 14 }, { dc: 1, dr: -1, cost: 14 },
            { dc: -1, dr: 1, cost: 14 }, { dc: -1, dr: -1, cost: 14 },
        ];

        const gScore = new Map();
        const fScore = new Map();
        const cameFrom = new Map();
        const closed = new Set();
        // Simple priority queue using sorted array (good enough for our grid size)
        const open = [{ key: startKey, c: ws.c, r: ws.r, f: 0 }];
        gScore.set(startKey, 0);

        function heuristic(c, r) {
            const dc = Math.abs(c - we.c);
            const dr = Math.abs(r - we.r);
            return 10 * (dc + dr) + (14 - 20) * Math.min(dc, dr); // octile distance
        }

        let iterations = 0;
        const MAX_ITER = 5000; // safety cap
        while (open.length > 0 && iterations++ < MAX_ITER) {
            // Pop lowest f
            let bestIdx = 0;
            for (let i = 1; i < open.length; i++) {
                if (open[i].f < open[bestIdx].f) bestIdx = i;
            }
            const current = open.splice(bestIdx, 1)[0];
            if (current.key === endKey) {
                // Reconstruct path
                const cells = [];
                let k = endKey;
                let cc = we.c, cr = we.r;
                while (k !== startKey) {
                    cells.push({ c: cc, r: cr });
                    const prev = cameFrom.get(k);
                    if (!prev) break;
                    cc = prev.c; cr = prev.r;
                    k = cr * NAV_COLS + cc;
                }
                cells.reverse();
                // Convert to world points; replace last with actual target
                const path = cells.map(({ c, r }) => gridToWorld(c, r));
                if (path.length > 0) {
                    path[path.length - 1] = { x: endX, y: endY };
                }
                return path;
            }
            closed.add(current.key);

            for (const m of moves) {
                const nc = current.c + m.dc;
                const nr = current.r + m.dr;
                if (!navIsWalkable(nc, nr)) continue;
                // Prevent diagonal cutting through corners
                if (m.dc !== 0 && m.dr !== 0) {
                    if (!navIsWalkable(current.c + m.dc, current.r) ||
                        !navIsWalkable(current.c, current.r + m.dr)) continue;
                }
                const nk = nr * NAV_COLS + nc;
                if (closed.has(nk)) continue;
                const tentativeG = gScore.get(current.key) + m.cost;
                if (tentativeG < (gScore.get(nk) ?? Infinity)) {
                    cameFrom.set(nk, { c: current.c, r: current.r });
                    gScore.set(nk, tentativeG);
                    const f = tentativeG + heuristic(nc, nr);
                    fScore.set(nk, f);
                    // Update or push in open
                    let existingIdx = -1;
                    for (let i = 0; i < open.length; i++) {
                        if (open[i].key === nk) { existingIdx = i; break; }
                    }
                    if (existingIdx >= 0) open[existingIdx].f = f;
                    else open.push({ key: nk, c: nc, r: nr, f });
                }
            }
        }
        return null; // no path
    }

    // Path smoothing: skip waypoints reachable by direct line of sight to shorten the path
    function smoothPath(path, hitbox) {
        if (!path || path.length < 3) return path;
        function lineFree(ax, ay, bx, by) {
            const dx = bx - ax, dy = by - ay;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const steps = Math.ceil(dist / 6);
            for (let s = 1; s <= steps; s++) {
                const t = s / steps;
                const x = ax + dx * t, y = ay + dy * t;
                const hb = { x: x - hitbox.w/2, y: y + hitbox.offsetY - hitbox.h/2, w: hitbox.w, h: hitbox.h };
                for (const c of getCurrentColliders()) {
                    if (rectsOverlap(hb, c)) return false;
                }
            }
            return true;
        }
        const out = [path[0]];
        let i = 0;
        while (i < path.length - 1) {
            let j = path.length - 1;
            while (j > i + 1 && !lineFree(path[i].x, path[i].y, path[j].x, path[j].y)) j--;
            out.push(path[j]);
            i = j;
        }
        return out;
    }

    // Frame counts per animation (idle = 5, running = 8)
    const ANIM_FRAMES = {
        idle: 5,
        idle_down: 5,
        idle_up: 5,
        idle_diag_haut: 5,
        idle_diag_bas: 5,
        run: 8,
        run_down: 8,
        run_up: 8,
        diag: 8,
        diag_bas: 8,
        gifle: 3,
        panique: 4,
        panique_haut: 4,
        panique_bas: 4,
        panique_diag_haut: 4,
        panique_diag_bas: 4,
    };

    // ========== STATE ==========
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const keys = {};
    const player = {
        x: 350, y: 280,
        facingLeft: true,
        frame: 0,
        animTimer: 0,
        moving: false,
        currentAnim: 'idle',
        lastDirection: 'side',
        // Health & gifle
        health: 3,
        gifleTimer: 0,      // frames of gifle animation
        gifleActive: false,
        headBlink: 0,        // blink timer for HUD head
        // Panique state
        panique: false,
        mashCount: 0,         // number of A presses in the recent window
        mashTimer: 0,         // frames since last A press (decays mashCount)
        // Score
        score: 0,
        scorePopup: null,    // { text: '+x', timer: frames }
    };
    // Remote player state (multi only) — visual; positions interpolated from network.
    const remotePlayer = {
        active: false,
        // Rendered (smoothed) position
        x: 350, y: 280,
        // Latest target from network (we lerp toward this)
        targetX: 350, targetY: 280,
        facingLeft: false,
        frame: 0,
        currentAnim: 'idle',
        panique: false,
        scorePopup: null,
        score: 0,
        health: 3,
    };
    const camera = { x: 350, y: 280 };

    // ========== GAME STATE MACHINE ==========
    // 'menu' -> 'defi' -> 'game' -> 'victoire'. Multi adds 'lobby' between menu and defi.
    const gameState = {
        screen: 'menu',
        menuSelection: 0,
        defiAnim: 0,
        mode: 'solo',           // 'solo' or 'multi'
        defiReadyCount: 0,      // multi: number of players who pressed A on defi (host-tracked)
        defiSelfReady: false,   // local: has this player pressed A on defi?
        // Victoire screen state
        victoireAnim: 0,        // 0->1 slide-down progress
        victoirePlayers: [],    // [{nickname, score, isLocal}] sorted by score desc, set on entry
    };

    // ========== MULTIPLAYER (PeerJS) ==========
    // Quick-match strategy: a small pool of well-known PeerJS IDs forms a virtual lobby.
    // Host claims the first free slot. Joiner probes the slots until it finds one taken.
    const LOBBY_SLOTS = [
        'titeuf-ze-classroom-lobby-01',
        'titeuf-ze-classroom-lobby-02',
        'titeuf-ze-classroom-lobby-03',
        'titeuf-ze-classroom-lobby-04',
        'titeuf-ze-classroom-lobby-05',
    ];
    const net = {
        peer: null,             // PeerJS instance
        conn: null,             // active DataConnection
        isHost: false,
        connected: false,
        nickname: '',
        peerNickname: '',
        searchStatus: 'idle',   // 'idle' | 'searching' | 'hosting' | 'connecting' | 'ready' | 'error'
        searchMessage: '',
    };

    // Send a message to the other peer (no-op if no connection)
    function netSend(msg) {
        if (!net.conn || !net.conn.open) return;
        try { net.conn.send(msg); } catch (_) {}
    }

    // Try to be a JOINER: probe slots in order, connect to the first one alive.
    async function tryJoinExistingLobby() {
        for (const slotId of LOBBY_SLOTS) {
            const success = await new Promise((resolve) => {
                let resolved = false;
                const probePeer = new Peer(undefined, { debug: 0 });
                let conn = null;
                const cleanup = (ok) => {
                    if (resolved) return;
                    resolved = true;
                    if (!ok && conn) try { conn.close(); } catch (_) {}
                    if (!ok) try { probePeer.destroy(); } catch (_) {}
                    resolve(ok);
                };
                const timeout = setTimeout(() => cleanup(false), 3000);
                probePeer.on('open', () => {
                    conn = probePeer.connect(slotId, { reliable: true });
                    conn.on('open', () => {
                        clearTimeout(timeout);
                        // We made it; promote this peer and conn to global state.
                        net.peer = probePeer;
                        net.conn = conn;
                        net.isHost = false;
                        wireConnection(conn);
                        cleanup(true);
                    });
                    conn.on('error', () => cleanup(false));
                });
                probePeer.on('error', () => cleanup(false));
            });
            if (success) return true;
        }
        return false;
    }

    // Become a HOST: claim the first available slot.
    async function tryBecomeHost() {
        for (const slotId of LOBBY_SLOTS) {
            const success = await new Promise((resolve) => {
                let resolved = false;
                const hostPeer = new Peer(slotId, { debug: 0 });
                const cleanup = (ok) => {
                    if (resolved) return;
                    resolved = true;
                    if (!ok) try { hostPeer.destroy(); } catch (_) {}
                    resolve(ok);
                };
                const timeout = setTimeout(() => cleanup(false), 3000);
                hostPeer.on('open', () => {
                    clearTimeout(timeout);
                    net.peer = hostPeer;
                    net.isHost = true;
                    // Wait for a joiner
                    hostPeer.on('connection', (conn) => {
                        // Reject if we already have a connection (shouldn't happen, but safe)
                        if (net.conn && net.conn.open) { try { conn.close(); } catch (_) {} return; }
                        net.conn = conn;
                        conn.on('open', () => {
                            wireConnection(conn);
                            // Send our nickname so the joiner can display it
                            netSend({ type: 'hello', nickname: net.nickname });
                        });
                    });
                    cleanup(true);
                });
                hostPeer.on('error', () => cleanup(false));
            });
            if (success) return true;
        }
        return false;
    }

    function wireConnection(conn) {
        conn.on('data', onNetData);
        conn.on('close', () => {
            net.connected = false;
            net.searchStatus = 'error';
            net.searchMessage = 'Connexion perdue';
        });
        // For the joiner: announce ourselves immediately
        if (!net.isHost) {
            net.connected = true;
            netSend({ type: 'hello', nickname: net.nickname });
        }
    }

    function onNetData(msg) {
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'hello') {
            net.peerNickname = msg.nickname || 'Joueur';
            net.connected = true;
            net.searchStatus = 'ready';
        } else if (msg.type === 'start_defi') {
            // Host signals: leave lobby, show defi screen
            gameState.screen = 'defi';
            gameState.defiAnim = 0;
            gameState.defiSelfReady = false;
            gameState.defiReadyCount = 0;
            restartMusicFromStart();
        } else if (msg.type === 'defi_ready') {
            // Track readiness (host counts both, broadcasts)
            if (net.isHost) {
                gameState.defiReadyCount = Math.min(2, gameState.defiReadyCount + 1);
                // If both ready, start the game
                if (gameState.defiReadyCount >= 2 && gameState.defiSelfReady) {
                    netSend({ type: 'start_game' });
                    startGame();
                }
            }
        } else if (msg.type === 'start_game') {
            startGame();
        } else if (msg.type === 'player_state') {
            // Other player's transform/animation snapshot — store as interpolation target.
            if (!remotePlayer.active) {
                remotePlayer.x = msg.x;
                remotePlayer.y = msg.y;
            }
            remotePlayer.active = true;
            remotePlayer.targetX = msg.x;
            remotePlayer.targetY = msg.y;
            remotePlayer.facingLeft = !!msg.facingLeft;
            remotePlayer.frame = msg.frame|0;
            remotePlayer.currentAnim = msg.anim || 'idle';
            remotePlayer.panique = !!msg.panique;
            if (typeof msg.score === 'number') remotePlayer.score = msg.score;
            if (typeof msg.health === 'number') remotePlayer.health = msg.health;
            // Remote player's viewport (used for symmetric detection in multi)
            if (msg.halfW) remotePlayer.halfW = msg.halfW;
            if (msg.halfH) remotePlayer.halfH = msg.halfH;
        } else if (msg.type === 'world_state') {
            // Host -> joiner: snapshot of authoritative world (npc + items)
            applyWorldStateFromHost(msg);
        } else if (msg.type === 'world_event') {
            // One-shot events from host (e.g. she just slipped, item picked, etc.)
            applyWorldEvent(msg);
        } else if (msg.type === 'request_hit_npc') {
            // Joiner asks host to apply a hit on the maitresse.
            if (!net.isHost) return;
            const npc = npcs[0];
            if (!npc) return;
            if (npc.state === 'tombe' || npc.state === 'gifle') return;
            const wasSliding = npc.state === 'glisse';
            npc.state = 'glisse';
            npc.slideKind = slideKindFor(msg.dx, msg.dy);
            const gInfo = glisseSpriteFor(npc, npc.slideKind);
            npc.currentSprite = gInfo.sprite;
            npc.totalFrames = gInfo.frames;
            if (!wasSliding) { npc.frame = 0; npc.animTimer = 0; }
            npc.fps = 10;
            const throwSpeed = Math.sqrt(msg.dx * msg.dx + msg.dy * msg.dy);
            const norm = throwSpeed > 0 ? throwSpeed : 1;
            npc.slideDx = (msg.dx / norm) * 3;
            npc.slideDy = (msg.dy / norm) * 3;
            npc.slideLife = 45;
            npc.comboCount = (npc.comboCount || 0) + 1;
            // Track that the JOINER hit her -> she'll be angry at 'remote' on host side
            npc.angryAt = 'remote';
            if (msg.dx !== 0) npc.facingLeft = msg.dx < 0;
            const entry = worldItems.find(w => w.id === msg.itemId);
            if (entry) {
                entry.picked = true;
                entry.respawnTimer = -1;
            }
            startGlisseSound();
        } else if (msg.type === 'request_pickup') {
            // Joiner asks host to mark an item as picked up (for sync).
            if (!net.isHost) return;
            const entry = worldItems.find(w => w.id === msg.itemId);
            if (entry && !entry.picked) {
                entry.picked = true;
                entry.dropped = false;
                entry.droppedBy = null; // forget previous trap owner
                entry.respawnTimer = 0;
            }
        } else if (msg.type === 'request_drop') {
            // Joiner dropped a trap at (x,y).
            if (!net.isHost) return;
            const entry = worldItems.find(w => w.id === msg.itemId);
            if (entry) {
                entry.x = msg.x; entry.y = msg.y;
                // IMPORTANT: do NOT overwrite spawnX/spawnY here. The item must
                // respawn at its original spawn point, not where it landed.
                entry.picked = false;
                entry.dropped = true;
                entry.respawnTimer = 0;
                // Track that the joiner is responsible for this trap.
                entry.droppedBy = 'remote';
            }
        } else if (msg.type === 'request_alert') {
            // Joiner threw an item; check if maitresse is alert toward them.
            if (!net.isHost) return;
            for (const n of npcs) {
                if (!n.patrol) continue;
                if (n.state === 'glisse' || n.state === 'tombe' || n.state === 'gifle') continue;
                // Use vigilanceRemote for the joiner's POV
                if ((n.vigilanceRemote || 'calm') !== 'alert') continue;
                n.state = 'poursuit';
                n.vigilance = 'angry';
                n.angrySpeedTimer = 420;
                n.angryAt = msg.by || 'remote';
                n.frame = 0; n.animTimer = 0;
                n.path = null; n.pathRecalcTimer = 0;
            }
        } else if (msg.type === 'request_health_pickup') {
            // Joiner ramasses item_hp
            if (!net.isHost) return;
            if (!healthPickup.picked) {
                healthPickup.picked = true;
                healthPickup.respawnTimer = healthPickup.respawnDuration;
                healthPickup.pickupCooldown = 30;
            }
        } else if (msg.type === 'sound_event') {
            // Replay a sound triggered by the other player for awareness
            if (msg.name) playSound(msg.name);
        } else if (msg.type === 'item_throw') {
            // The other player threw an item; create a ghost projectile so we
            // see the same animation. Ghosts don't collide with NPCs or walls
            // (the thrower's side is authoritative for that).
            thrownItems.push({
                id: msg.id,
                sprite: msg.sprite,
                x: msg.x, y: msg.y,
                dx: msg.dx, dy: msg.dy,
                life: msg.life || 55,
                size: msg.size || 38,
                sliding: true,
                ghost: true,
            });
        } else if (msg.type === 'score_event') {
            // Host -> joiner: you scored, add the points + show popup over yourself.
            if (typeof msg.pts === 'number') {
                player.score += msg.pts;
                player.scorePopup = { text: '+' + msg.pts, timer: 180 };
            }
        } else if (msg.type === 'remote_score_popup') {
            // Host -> joiner: the OTHER player (host) just scored. Show a popup over their Titeuf.
            if (typeof msg.pts === 'number') {
                remotePlayer.scorePopup = { text: '+' + msg.pts, timer: 180 };
            }
        } else if (msg.type === 'victoire') {
            // The other player walked through the door. Sync our screen to victoire.
            // Use the score they just sent (most up-to-date for them).
            if (typeof msg.score === 'number') remotePlayer.score = msg.score;
            if (msg.nickname) net.peerNickname = msg.nickname;
            triggerVictory(false);
        } else if (msg.type === 'goto_cuisine') {
            // The other player pressed A on the victoire screen — follow them
            // into the kitchen so we stay together for the post-victory exploration.
            if (gameState.screen === 'victoire' || gameState.screen === 'game') {
                startCuisine(false); // don't broadcast again, we received the request
            }
        } else if (msg.type === 'goto_menu_from_cuisine') {
            // Other player went back to menu — we follow.
            currentMap = 'classe';
            setActiveNpcForMap('classe');
            remotePlayer.active = false;
            gameState.screen = 'menu';
            restartMusicFromStart();
            cleanupNet();
        }
    }

    // Send our player state to the peer (called once per frame in multi)
    let netPlayerTickCounter = 0;
    function netTickPlayer() {
        if (gameState.mode !== 'multi') return;
        if (!net.conn || !net.conn.open) return;
        // Throttle to ~20 Hz to keep traffic light
        netPlayerTickCounter++;
        if (netPlayerTickCounter < 3) return;
        netPlayerTickCounter = 0;
        netSend({
            type: 'player_state',
            x: Math.round(player.x * 10) / 10,
            y: Math.round(player.y * 10) / 10,
            facingLeft: player.facingLeft,
            frame: player.frame,
            anim: player.currentAnim,
            panique: player.panique,
            score: player.score,
            health: player.health,
            // Local viewport so host can apply detection using THIS player's screen size
            halfW: canvas.width / (2 * CONFIG.CAMERA_ZOOM),
            halfH: canvas.height / (2 * CONFIG.CAMERA_ZOOM),
        });
    }

    // Host -> joiner authoritative state snapshot (~30 Hz)
    function netTickWorldState() {
        if (gameState.mode !== 'multi' || !net.isHost) return;
        if (!net.conn || !net.conn.open) return;
        netWorldTickCounter++;
        if (netWorldTickCounter < 2) return;
        netWorldTickCounter = 0;
        const npc = npcs[0];
        if (!npc) return;
        netSend({
            type: 'world_state',
            npc: {
                x: Math.round(npc.x * 10) / 10,
                y: Math.round(npc.y * 10) / 10,
                facingLeft: npc.facingLeft,
                state: npc.state,
                vigilance: npc.vigilance,
                vigilanceLocal: npc.vigilanceLocal || 'calm',
                vigilanceRemote: npc.vigilanceRemote || 'calm',
                slideKind: npc.slideKind || 'h',
                frame: npc.frame,
                fps: npc.fps,
                currentSprite: npc.currentSprite,
                totalFrames: npc.totalFrames,
                target: npc.chaseTarget || null,
            },
            items: worldItems.map(it => ({
                id: it.id,
                x: Math.round(it.x * 10) / 10,
                y: Math.round(it.y * 10) / 10,
                picked: it.picked,
                dropped: !!it.dropped,
            })),
            health: {
                picked: healthPickup.picked,
            },
        });
    }
    let netWorldTickCounter = 0;

    function applyWorldStateFromHost(msg) {
        // Apply NPC state — interpolate positions, advance frames locally.
        const npc = npcs[0];
        if (npc && msg.npc) {
            const prevState = npc.state;
            npc._netTargetX = msg.npc.x;
            npc._netTargetY = msg.npc.y;
            if (npc._netInitialized !== true) {
                npc.x = msg.npc.x;
                npc.y = msg.npc.y;
                npc._netInitialized = true;
            }
            npc.facingLeft = msg.npc.facingLeft;
            // Vigilance: host's "local" view is for the host. From joiner's perspective, swap.
            if (msg.npc.vigilanceLocal !== undefined) {
                npc.vigilanceRemote = msg.npc.vigilanceLocal;
                npc.vigilanceLocal = msg.npc.vigilanceRemote || 'calm';
            }
            // Display vigilance = what THIS player sees
            npc.vigilance = npc.vigilanceLocal || msg.npc.vigilance;
            npc.slideKind = msg.npc.slideKind || 'h';
            // Store the chaseTarget tag exactly as host sent it.
            // Inversion is handled in getChaseTarget() when needed.
            npc.chaseTarget = msg.npc.target;
            // State / sprite resets the frame counter to avoid jumps,
            // but only when state OR sprite changes.
            const stateChanged = prevState !== msg.npc.state;
            const spriteChanged = npc.currentSprite !== msg.npc.currentSprite;
            npc.state = msg.npc.state;
            npc.currentSprite = msg.npc.currentSprite;
            npc.totalFrames = msg.npc.totalFrames;
            if (msg.npc.fps) npc.fps = msg.npc.fps;
            if (stateChanged || spriteChanged) {
                npc.frame = msg.npc.frame;
                npc.animTimer = 0;
            }
            // State transition side-effects (sounds)
            if (prevState !== 'glisse' && npc.state === 'glisse') {
                startGlisseSound();
            } else if (prevState === 'glisse' && npc.state !== 'glisse') {
                stopGlisseSound();
                if (npc.state === 'tombe') playSound('tombe');
            }
        }
        // Items
        if (msg.items) {
            for (const incoming of msg.items) {
                const entry = worldItems.find(w => w.id === incoming.id);
                if (entry) {
                    // If we just locally dropped this item, ignore host's stale position for a moment.
                    if (entry._localDropCooldown > 0) {
                        entry.picked = incoming.picked;
                        entry.dropped = incoming.dropped;
                        continue;
                    }
                    // If we just locally picked this item, don't let the host's
                    // (potentially stale) world_state un-pick it and re-trigger
                    // the pickup loop. Keep our local picked=true until the host
                    // catches up (then incoming.picked will be true too).
                    if (entry._localPickCooldown > 0 && entry.picked && !incoming.picked) {
                        // Skip the picked/dropped/position overwrite for this tick.
                        continue;
                    }
                    entry._netTargetX = incoming.x;
                    entry._netTargetY = incoming.y;
                    if (entry._netInitialized !== true) {
                        entry.x = incoming.x;
                        entry.y = incoming.y;
                        entry._netInitialized = true;
                    }
                    entry.picked = incoming.picked;
                    entry.dropped = incoming.dropped;
                }
            }
        }
        if (msg.health) {
            // Same guard as items: if joiner just locally picked HP, ignore stale
            // un-picked world_state for a brief window.
            if (healthPickup._localPickCooldown > 0 && healthPickup.picked && !msg.health.picked) {
                // skip
            } else {
                healthPickup.picked = msg.health.picked;
            }
        }
    }

    function applyWorldEvent(msg) {
        // One-shot events sent by the host
        if (msg.event === 'gifle') {
            playSound('gifle');
        } else if (msg.event === 'gifle_remote') {
            // The host's maitresse slapped THIS joiner.
            player.gifleActive = true;
            player.gifleTimer = 48;
            player.health = Math.max(0, player.health - 1);
            player.headBlink = 120;
            player.frame = 0; player.animTimer = 0;
            playSound('gifle');
        } else if (msg.event === 'tombe') {
            playSound('tombe');
        } else if (msg.event === 'drop') {
            playSound('drop');
        }
    }

    // Kick off matchmaking when entering lobby
    async function startMatchmaking() {
        net.searchStatus = 'searching';
        net.searchMessage = 'Recherche d\u2019une partie...';
        // First, try to join an existing lobby
        const joined = await tryJoinExistingLobby();
        if (joined) {
            net.searchStatus = 'connecting';
            net.searchMessage = 'Connexion en cours...';
            return;
        }
        // Otherwise, become a host
        net.searchStatus = 'hosting';
        net.searchMessage = 'En attente d\u2019un autre joueur...';
        const hosted = await tryBecomeHost();
        if (!hosted) {
            net.searchStatus = 'error';
            net.searchMessage = 'Impossible de cr\u00e9er une partie.';
        }
    }

    function cleanupNet() {
        try { if (net.conn) net.conn.close(); } catch (_) {}
        try { if (net.peer) net.peer.destroy(); } catch (_) {}
        net.peer = null;
        net.conn = null;
        net.isHost = false;
        net.connected = false;
        net.peerNickname = '';
        net.searchStatus = 'idle';
        net.searchMessage = '';
    }

    function loadSounds() {
        const sources = {
            gifle: 'son/gifle.mp3',
            drop: 'son/drop.mp3',
            loot: 'son/loot.mp3',
            glisse: 'son/glisse.mp3',
            tombe: 'son/tombe.mp3',
            music_classe: 'son/classe.mp3',
            music_cuisine: 'son/cuisine.mp3',
            victoire: 'son/victoire.mp3',
        };
        for (const [key, src] of Object.entries(sources)) {
            const a = new Audio();
            a.src = src;
            a.preload = 'auto';
            sounds[key] = a;
        }
        // Music: loop forever, lower volume
        sounds.music_classe.loop = true;
        sounds.music_classe.volume = 0.4;
        sounds.music_cuisine.loop = true;
        sounds.music_cuisine.volume = 0.4;

        sounds.glisse.loop = true;

    // Background music starts on first user interaction (browser autoplay policy).
    let musicStarted = false;
    function startMusic() {
        if (musicStarted) return;
        const m = (currentMap === 'cuisine') ? sounds.music_cuisine : sounds.music_classe;
        if (!m) return;
        m.play().then(() => { musicStarted = true; }).catch(() => {});
    }

    // Play a sound locally AND propagate it to the peer in multi.
    // Use this for sounds the other player should hear from your actions
    // (loot, drop, etc.). Don't use for sounds already implied by sync state
    // (glisse, tombe, gifle on the chased target).
    function broadcastSound(name, volume) {
        playSound(name, volume);
        if (gameState.mode === 'multi' && net.conn && net.conn.open) {
            netSend({ type: 'sound_event', name });
        }
    }

    // Looping glisse sound helpers
    function startGlisseSound() {
        const a = sounds.glisse;
        if (!a) return;
        try {
            a.currentTime = 0;
            a.play().catch(() => {});
        } catch (_) {}
    }
    function stopGlisseSound() {
        const a = sounds.glisse;
        if (!a) return;
        try { a.pause(); a.currentTime = 0; } catch (_) {}

    // ========== INPUT ==========
    window.addEventListener('keydown', (e) => {
        if (e.code === 'F11' || e.code === 'F12' || e.code === 'F5') return;
        // Debug: press C to log Titeuf's current world coordinates
        if (e.code === 'KeyC' && !keys['KeyC']) {
            console.log(`Titeuf coords: { x: ${Math.round(player.x)}, y: ${Math.round(player.y)} }`);
        }
        keys[e.code] = true;
        startMusic(); // first interaction unlocks audio
        e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'F11' || e.code === 'F12' || e.code === 'F5') return;
        keys[e.code] = false;
        e.preventDefault();
    });
    // Also start on click and gamepad button press
    window.addEventListener('mousedown', startMusic);
    window.addEventListener('touchstart', startMusic);

    // Gamepad state
    const gamepad = {
        lx: 0, ly: 0,
        dpad: { up: false, down: false, left: false, right: false },
        a: false, aPrev: false,
        lb: false, lbPrev: false,
        rb: false, rbPrev: false,
    };
    const DEADZONE = 0.25;

    function pollGamepad() {
        const gps = navigator.getGamepads ? navigator.getGamepads() : [];
        for (const gp of gps) {
            if (!gp) continue;
            // Left stick: axes 0 (X) and 1 (Y)
            let lx = gp.axes[0] || 0;
            let ly = gp.axes[1] || 0;
            if (Math.abs(lx) < DEADZONE) lx = 0;
            if (Math.abs(ly) < DEADZONE) ly = 0;
            gamepad.lx = lx;
            gamepad.ly = ly;
            // D-pad: buttons 12=up, 13=down, 14=left, 15=right
            gamepad.dpad.up = gp.buttons[12] && gp.buttons[12].pressed;
            gamepad.dpad.down = gp.buttons[13] && gp.buttons[13].pressed;
            gamepad.dpad.left = gp.buttons[14] && gp.buttons[14].pressed;
            gamepad.dpad.right = gp.buttons[15] && gp.buttons[15].pressed;
            // A button (Xbox: button 0)
            gamepad.aPrev = gamepad.a;
            gamepad.a = gp.buttons[0] && gp.buttons[0].pressed;
            // Bumpers: LB = button 4, RB = button 5 (standard mapping)
            gamepad.lbPrev = gamepad.lb;
            gamepad.rbPrev = gamepad.rb;
            gamepad.lb = gp.buttons[4] && gp.buttons[4].pressed;
            gamepad.rb = gp.buttons[5] && gp.buttons[5].pressed;
            // Any button press / stick movement counts as user interaction (unlocks audio)
            if (!musicStarted && (gamepad.a || gamepad.lb || gamepad.rb ||
                gamepad.dpad.up || gamepad.dpad.down || gamepad.dpad.left || gamepad.dpad.right ||
                lx !== 0 || ly !== 0)) {
                startMusic();
            }
            return;
        }
        gamepad.lx = 0;
        gamepad.ly = 0;
        gamepad.dpad.up = gamepad.dpad.down = gamepad.dpad.left = gamepad.dpad.right = false;
    }

    function getInput() {
        pollGamepad();
        let dx = 0, dy = 0;
        // Keyboard
        if (keys['ArrowLeft'] || keys['KeyQ']) dx -= 1;
        if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
        if (keys['ArrowUp'] || keys['KeyZ']) dy -= 1;
        if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
        // D-pad
        if (gamepad.dpad.left) dx -= 1;
        if (gamepad.dpad.right) dx += 1;
        if (gamepad.dpad.up) dy -= 1;
        if (gamepad.dpad.down) dy += 1;
        // Clamp
        dx = Math.max(-1, Math.min(1, dx));
        dy = Math.max(-1, Math.min(1, dy));
        // Stick override if active
        if (gamepad.lx !== 0 || gamepad.ly !== 0) {
            dx = gamepad.lx;
            dy = gamepad.ly;
        }
        // Normalize keyboard/dpad diagonal (stick is already analog)
        if (gamepad.lx === 0 && gamepad.ly === 0 && dx !== 0 && dy !== 0) {
            const inv = 1 / Math.SQRT2;
            dx *= inv; dy *= inv;
        }
        return { dx, dy };
    }

    function getRawInput() {
        let dx = (keys['ArrowLeft'] || keys['KeyQ'] ? -1 : 0) + (keys['ArrowRight'] || keys['KeyD'] ? 1 : 0);
        let dy = (keys['ArrowUp'] || keys['KeyZ'] ? -1 : 0) + (keys['ArrowDown'] || keys['KeyS'] ? 1 : 0);
        // D-pad raw
        if (gamepad.dpad.left) dx -= 1;
        if (gamepad.dpad.right) dx += 1;
        if (gamepad.dpad.up) dy -= 1;
        if (gamepad.dpad.down) dy += 1;
        dx = Math.max(-1, Math.min(1, dx));
        dy = Math.max(-1, Math.min(1, dy));
        // Stick raw direction override
        if (gamepad.lx !== 0 || gamepad.ly !== 0) {
            dx = gamepad.lx > 0 ? 1 : gamepad.lx < 0 ? -1 : 0;
            dy = gamepad.ly > 0 ? 1 : gamepad.ly < 0 ? -1 : 0;
        }
        return { dx, dy };
    }

    // ========== COLLISION ==========
    function playerHitbox(px, py) {
        return {
            x: px - CONFIG.PLAYER_HITBOX.w / 2,
            y: py + CONFIG.PLAYER_HITBOX.offsetY - CONFIG.PLAYER_HITBOX.h / 2,
            w: CONFIG.PLAYER_HITBOX.w,
            h: CONFIG.PLAYER_HITBOX.h,
        };
    }
    function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x &&
               a.y < b.y + b.h && a.y + a.h > b.y;
    }
    // Pick a sprite kind for a slide direction (used for both glisse and tombe variants).
    // Same threshold logic as poursuit_diag selection: ratio Y/X.
    function slideKindFor(dx, dy) {
        const ax = Math.abs(dx), ay = Math.abs(dy);
        const ratio = ax === 0 ? Infinity : ay / ax;
        if (ratio > 2.5) return dy < 0 ? 'haut' : 'bas';
        if (ratio > 0.4) return dy < 0 ? 'diag_haut' : 'diag_bas';
        return 'h';
    }
    function glisseSpriteFor(npc, kind) {
        switch (kind) {
            case 'haut': return { sprite: npc.sprites.glisse_haut, frames: 3 };
            case 'bas': return { sprite: npc.sprites.glisse_bas, frames: 3 };
            case 'diag_haut': return { sprite: npc.sprites.glisse_diag_haut, frames: 2 };
            case 'diag_bas': return { sprite: npc.sprites.glisse_diag_bas, frames: 3 };
            default: return { sprite: npc.sprites.glisse, frames: 4 };
        }
    }
    function tombeSpriteFor(npc, kind) {
        switch (kind) {
            case 'haut': return npc.sprites.tombe_haut;
            case 'bas': return npc.sprites.tombe_bas;
            case 'diag_haut': return npc.sprites.tombe_diag_haut;
            case 'diag_bas': return npc.sprites.tombe_diag_bas;
            default: return npc.sprites.tombe;
        }
    }
    function canMove(nx, ny) {
        const hb = playerHitbox(nx, ny);
        const colliders = getCurrentColliders();
        for (const c of colliders) {
            if (rectsOverlap(hb, c)) return false;
        }
        return true;
    }

    // ========== DETERMINE ANIMATION ==========
    function getIdleAnim() {
        switch (player.lastDirection) {
            case 'down': return 'idle_down';
            case 'up': return 'idle_up';
            case 'diag_haut': return 'idle_diag_haut';
            case 'diag_bas': return 'idle_diag_bas';
            default: return 'idle'; // side
        }
    }

    function getAnimState(raw) {
        // When chased, Titeuf is in panic mode. Pick the right panique sprite per direction
        // (or by lastDirection when idle, so a player facing up keeps panique_haut).
        if (player.panique) {
            if (raw.dx === 0 && raw.dy === 0) {
                switch (player.lastDirection) {
                    case 'down': return 'panique_bas';
                    case 'up': return 'panique_haut';
                    case 'diag_haut': return 'panique_diag_haut';
                    case 'diag_bas': return 'panique_diag_bas';
                    default: return 'panique'; // side
                }
            }
            if (raw.dy < 0 && raw.dx !== 0) return 'panique_diag_haut'; // up + horizontal
            if (raw.dy > 0 && raw.dx !== 0) return 'panique_diag_bas';  // down + horizontal
            if (raw.dy < 0 && raw.dx === 0) return 'panique_haut';      // pure up
            if (raw.dy > 0 && raw.dx === 0) return 'panique_bas';       // pure down
            return 'panique';                                           // pure horizontal
        }
        if (raw.dx === 0 && raw.dy === 0) return getIdleAnim();
        if (raw.dy < 0 && raw.dx !== 0) return 'diag';       // up + horizontal
        if (raw.dy > 0 && raw.dx !== 0) return 'diag_bas';   // down + horizontal
        if (raw.dy > 0 && raw.dx === 0) return 'run_down';   // pure down
        if (raw.dy < 0 && raw.dx === 0) return 'run_up';     // pure up
        return 'run'; // pure horizontal
    }

    // Multi: returns the entity object the NPC should chase.
    // - Solo: always the local player.
    // - Multi host: determines closest visible target (player or remotePlayer),
    //   sticks to npc.chaseTarget once set until target is no longer visible.
    // - Multi joiner: reads npc.chaseTarget set by host (inverted local/remote).
    function getChaseTarget(npc) {
        if (gameState.mode !== 'multi') return player;
        const tag = npc.chaseTarget || 'local';
        if (net.isHost) {
            return tag === 'remote' ? remotePlayer : player;
        } else {
            // On joiner, host's "local" target == this joiner's remotePlayer
            return tag === 'remote' ? player : remotePlayer;
        }
    }
    // Host-only: choose chase target based on who provoked her (angryAt).
    // Falls back to closest only if no one provoked yet.
    function updateChaseTarget(npc) {
        if (gameState.mode !== 'multi' || !net.isHost) return;
        if (!remotePlayer.active) { npc.chaseTarget = 'local'; return; }
        // Use angryAt as the source of truth (set when she was hit)
        if (npc.angryAt === 'local' || npc.angryAt === 'remote') {
            npc.chaseTarget = npc.angryAt;
            return;
        }
        // Fallback: closest
        const dL = Math.hypot(player.x - npc.x, player.y - npc.y);
        const dR = Math.hypot(remotePlayer.x - npc.x, remotePlayer.y - npc.y);
        npc.chaseTarget = dR < dL ? 'remote' : 'local';
    }

    // ========== VICTOIRE / FIN DE PARTIE ==========
    // Triggered when a player walks into the exit door with score >= 8.
    // In multi, syncs both clients to the 'victoire' screen with both scores.
    function triggerVictory(triggeredByLocal) {
        if (gameState.screen === 'victoire') return; // already won, ignore
        // Build the player list for display
        const players = [];
        const myName = (net.nickname || 'Toi').slice(0, 14);
        players.push({ nickname: myName, score: player.score, isLocal: true });
        if (gameState.mode === 'multi' && remotePlayer.active) {
            const otherName = (net.peerNickname || 'Joueur 2').slice(0, 14);
            players.push({ nickname: otherName, score: remotePlayer.score || 0, isLocal: false });
        }
        // Sort by score desc (highest first)
        players.sort((a, b) => b.score - a.score);
        gameState.victoirePlayers = players;
        gameState.victoireAnim = 0;
        gameState.screen = 'victoire';
        // Stop music, play victory jingle
        try {
            if (sounds.music_classe) {
                sounds.music_classe.pause();
                sounds.music_classe.currentTime = 0;
            }
            if (sounds.music_cuisine) {
                sounds.music_cuisine.pause();
                sounds.music_cuisine.currentTime = 0;
            }
            stopGlisseSound();
        } catch (_) {}
        playSound('victoire');
        // Notify the other player so both screens are in sync
        if (triggeredByLocal && gameState.mode === 'multi' && net.conn && net.conn.open) {
            netSend({
                type: 'victoire',
                score: player.score,
                nickname: myName,
            });
        }
    }

    // Switch the active NPC according to current map. Call BEFORE setting currentMap.
    function setActiveNpcForMap(mapName) {
        // Swap the nav grid so pathfinding uses the right colliders
        navGrid = (mapName === 'cuisine') ? navGrid_cuisine : navGrid_classe;
        // Respawn items at their map-specific positions
        respawnItemsForMap(mapName);
        // Clear any thrown items left over from the previous map
        thrownItems.length = 0;
        // Clear inventory (Titeuf drops what he was carrying when switching maps)
        inventory.item = null;
        inventory.owned = [];
        inventory.showAnimActive = false;
        // Replace the contents of npcs in place (keeps the same array reference,
        // which other code may hold onto).
        npcs.length = 0;
        if (mapName === 'cuisine') {
            // Reset Francois to spawn position when entering kitchen
            NPC_FRANCOIS.x = NPC_FRANCOIS.spawnX;
            NPC_FRANCOIS.y = NPC_FRANCOIS.spawnY;
            NPC_FRANCOIS.state = 'idle';
            NPC_FRANCOIS.vigilance = 'calm';
            NPC_FRANCOIS.patrolIndex = 0;
            NPC_FRANCOIS.waitTimer = 180;
            NPC_FRANCOIS.frame = 0; NPC_FRANCOIS.animTimer = 0;
            NPC_FRANCOIS.slideLife = 0; NPC_FRANCOIS.tombeTimer = 0;
            NPC_FRANCOIS.angrySpeedTimer = 0; NPC_FRANCOIS.comboCount = 0;
            NPC_FRANCOIS.path = null; NPC_FRANCOIS.pathIndex = 0;
            NPC_FRANCOIS.pathRecalcTimer = 0;
            NPC_FRANCOIS.currentSprite = 'francois_idle';
            NPC_FRANCOIS.totalFrames = NPC_FRANCOIS.idleFrames;
            npcs.push(NPC_FRANCOIS);
        } else {
            npcs.push(NPC_MAITRESSE);
        }
    }

    // ========== KITCHEN MAP (second map, post-victory exploration) ==========
    // broadcast=true means: notify the other player to follow us into the kitchen.
    // broadcast=false: we are following the other player (received a goto_cuisine).
    function startCuisine(broadcast) {
        if (broadcast === undefined) broadcast = true;
        currentMap = 'cuisine';
        setActiveNpcForMap('cuisine');
        // Spawn positions: host on the left, joiner on the right (multi);
        // solo just spawns in the middle.
        if (gameState.mode === 'multi') {
            if (net.isHost) {
                player.x = 280; player.y = 380;
            } else {
                player.x = 480; player.y = 380;
            }
        } else {
            player.x = 380; player.y = 380;
        }
        player.health = 3;
        player.score = 0;
        player.panique = false;
        player.gifleActive = false;
        player.headBlink = 0;
        player.scorePopup = null;
        player.frame = 0; player.animTimer = 0;
        player.currentAnim = 'idle';
        player.facingLeft = false;
        // Keep remotePlayer active in multi so we keep seeing each other
        if (gameState.mode !== 'multi') {
            remotePlayer.active = false;
        }
        // Snap camera
        camera.x = player.x; camera.y = player.y;
        gameState.screen = 'game';
        // Restart background music (will pick cuisine.mp3 now that currentMap='cuisine')
        restartMusicFromStart();
        // Tell the other player to follow us, if we triggered the move
        if (broadcast && gameState.mode === 'multi' && net.conn && net.conn.open) {
            netSend({ type: 'goto_cuisine' });
        }
    }

    function update(dt) {
        const input = getInput();
        const raw = getRawInput();

        // In kitchen map: ESC / B returns to menu (escape hatch from solo exploration)
        if (currentMap === 'cuisine') {
            const bPressed = (keys['Escape'] && !keys['_prevEsc']) || (gamepad.b && !gamepad.bPrev);
            keys['_prevEsc'] = keys['Escape'];
            if (bPressed) {
                // In multi: tell the other player we're leaving, then disconnect cleanly
                if (gameState.mode === 'multi' && net.conn && net.conn.open) {
                    try { netSend({ type: 'goto_menu_from_cuisine' }); } catch (_) {}
                    cleanupNet();
                }
                currentMap = 'classe';
                setActiveNpcForMap('classe');
                remotePlayer.active = false;
                gameState.screen = 'menu';
                restartMusicFromStart();
                return;
            }
        }

        // ===== EXIT DOOR: detect when player reaches the door with score >= 8 =====
        // The door is the top-left wardrobe collider { x:36, y:55, w:78, h:40 }.
        // Player.y is the feet/center position; player can't enter the collider,
        // so we detect when they're standing just in front of (below) the door.
        // Zone: a generous box covering the door footprint + a strip below it.
        if (gameState.screen === 'game' && currentMap === 'classe' && player.score >= 8) {
            const doorMinX = 20;   // a bit wider than the door (36) for tolerance
            const doorMaxX = 130;  // door right edge ~114
            const doorMinY = 55;   // top of door
            const doorMaxY = 160;  // strip below door so feet position registers
            if (player.x > doorMinX && player.x < doorMaxX &&
                player.y > doorMinY && player.y < doorMaxY) {
                triggerVictory(true);
                return; // skip rest of update this frame
            }
        }

        // Smooth interpolation of the remote player toward its latest network target.
        // Lerp factor 0.25 = quick catch-up while staying smooth.
        if (remotePlayer.active) {
            const k = 0.25;
            remotePlayer.x += (remotePlayer.targetX - remotePlayer.x) * k;
            remotePlayer.y += (remotePlayer.targetY - remotePlayer.y) * k;
        }

        // Detect panique: any NPC currently chasing THIS player triggers panic mode.
        // In multi, the maitresse only panics the player she's actually chasing.
        let chased = false;
        for (const n of npcs) {
            if (n.state !== 'poursuit') continue;
            if (gameState.mode === 'multi') {
                // Only panic if I'm the target
                const target = getChaseTarget(n);
                if (target === player) { chased = true; break; }
            } else {
                chased = true; break;
            }
        }
        player.panique = chased;

        // Detect A press (panique mash). Same edge detection as throw button.
        const aPressedNow = (keys['KeyA'] && !keys['_prevAPanique']) || (gamepad.a && !gamepad.aPrev);
        keys['_prevAPanique'] = keys['KeyA'];

        // Track recent A presses in a sliding window (last 60 frames = 1 second).
        // mashCount reflects the actual current rhythm: if the player slows down,
        // it drops immediately as old presses fall out of the window.
        if (!player.mashHistory) player.mashHistory = [];
        if (aPressedNow) player.mashHistory.push(0); // 0 = age in frames
        // Age all entries and remove those older than 60 frames
        for (let i = 0; i < player.mashHistory.length; i++) player.mashHistory[i]++;
        while (player.mashHistory.length > 0 && player.mashHistory[0] > 60) {
            player.mashHistory.shift();
        }
        player.mashCount = Math.min(8, player.mashHistory.length);

        // Speed: in panique, base speed is halved without mashing.
        // Mashing brings it back up and significantly beyond.
        // mash 0 -> 0.5x (slow, caught fast)
        // mash 4 -> ~1.35x
        // mash 8 -> 2.2x (clearly outruns maitresse, escape in ~1s)
        let speed = CONFIG.PLAYER_SPEED;
        if (player.panique) {
            const mashFactor = 0.5 + player.mashCount * 0.2125; // 0.5 -> 2.2
            speed = CONFIG.PLAYER_SPEED * mashFactor;
        }

        player.moving = (input.dx !== 0 || input.dy !== 0);

        // Track last direction for idle
        if (player.moving) {
            if (raw.dy > 0 && raw.dx === 0) player.lastDirection = 'down';
            else if (raw.dy < 0 && raw.dx === 0) player.lastDirection = 'up';
            else if (raw.dy < 0 && raw.dx !== 0) player.lastDirection = 'diag_haut';
            else if (raw.dy > 0 && raw.dx !== 0) player.lastDirection = 'diag_bas';
            else player.lastDirection = 'side';
        }

        // Player gifle state (must be checked BEFORE normal animation)
        if (player.gifleActive) {
            player.gifleTimer--;
            player.currentAnim = 'gifle';
            player.animTimer += 5 / 60;
            if (player.animTimer >= 1) {
                player.animTimer = 0;
                if (player.frame < 2) {
                    player.frame++;
                }
                // Stay on last frame (frame 2)
            }
            if (player.gifleTimer <= 0) {
                player.gifleActive = false;
                player.currentAnim = 'idle';
                player.frame = 0;
                player.animTimer = 0;
            }
        } else {
            // Animation state (normal)
            const newAnim = getAnimState(raw);
            if (newAnim !== player.currentAnim) {
                player.currentAnim = newAnim;
                player.frame = 0;
                player.animTimer = 0;
            }

            if (player.moving) {
                if (raw.dx < 0) player.facingLeft = true;
                else if (raw.dx > 0) player.facingLeft = false;

                const nx = player.x + input.dx * speed;
                const ny = player.y + input.dy * speed;
                if (canMove(nx, ny)) { player.x = nx; player.y = ny; }
                else if (canMove(nx, player.y)) { player.x = nx; }
                else if (canMove(player.x, ny)) { player.y = ny; }

                player.x = Math.max(20, Math.min(CONFIG.MAP_W - 20, player.x));
                player.y = Math.max(230 * S + 20, Math.min(CONFIG.MAP_H - 20, player.y));
            }

            // Animation timing
            if (player.currentAnim && player.currentAnim.startsWith('panique')) {
                // Fixed 14 fps for all panique animations
                player.animTimer += 14 / 60;
            } else if (player.moving) {
                const isRunning = player.currentAnim === 'run' || player.currentAnim === 'diag' || player.currentAnim === 'diag_bas' || player.currentAnim === 'run_down' || player.currentAnim === 'run_up';
                const runMultiplier = isRunning ? 2.5 : 1.5;
                player.animTimer += CONFIG.ANIM_SPEED * runMultiplier;
            } else {
                player.animTimer += 9 / 60;
            }

            if (player.animTimer >= 1) {
                player.animTimer = 0;
                player.frame = (player.frame + 1) % ANIM_FRAMES[player.currentAnim];
            }
        }

        if (player.headBlink > 0) player.headBlink--;
        if (player.scorePopup) {
            player.scorePopup.timer--;
            if (player.scorePopup.timer <= 0) player.scorePopup = null;
        }
        if (remotePlayer.scorePopup) {
            remotePlayer.scorePopup.timer--;
            if (remotePlayer.scorePopup.timer <= 0) remotePlayer.scorePopup = null;
        }

        // Camera follows Titeuf exactly. The render-side clamping keeps it inside
        // the map bounds, so near a border Titeuf naturally drifts off-center.
        camera.x = player.x;
        camera.y = player.y;

        // Update NPCs
        // In multi-mode, only the host simulates NPCs. The joiner just animates
        // frames based on the host's broadcasted state.
        const skipNpcSim = gameState.mode === 'multi' && !net.isHost;
        if (skipNpcSim) {
            for (const npc of npcs) {
                if (!npc.patrol) continue;
                // Smooth interpolation toward host-provided target
                if (npc._netTargetX !== undefined) {
                    const k = 0.25;
                    npc.x += (npc._netTargetX - npc.x) * k;
                    npc.y += (npc._netTargetY - npc.y) * k;
                }
                // Advance animation frame locally (smoother than reading 15Hz host frames)
                npc.animTimer += (npc.fps || 6) / 60;
                if (npc.animTimer >= 1) {
                    npc.animTimer = 0;
                    const maxF = npc.totalFrames || 1;
                    if (npc.state === 'tombe') {
                        // Stop on last filled tombe frame (varies by NPC).
                        const tombeFrames = npc.tombeFrames || 6;
                        if (npc.frame < tombeFrames - 1) npc.frame++;
                    } else if (npc.state === 'gifle' || npc.state === 'idle') {
                        if (npc.frame < maxF - 1) npc.frame++;
                    } else {
                        npc.frame = (npc.frame + 1) % maxF;
                    }
                }
            }
            // Also interpolate items (skip those in local drop cooldown so they stay put)
            for (const item of worldItems) {
                if (item._localDropCooldown > 0) {
                    item._localDropCooldown--;
                    continue;
                }
                if (item._netTargetX !== undefined) {
                    const k = 0.30;
                    item.x += (item._netTargetX - item.x) * k;
                    item.y += (item._netTargetY - item.y) * k;
                }
            }
        } else {
        for (const npc of npcs) {
            if (!npc.patrol) {
                // Simple idle NPC - handle idle cycle if present
                if (npc.idleCycle) {
                    npc.idleCycleTimer--;
                    if (npc.idleCycleTimer <= 0) {
                        npc.idleCycleIndex = (npc.idleCycleIndex + 1) % npc.idleCycle.length;
                        const cycle = npc.idleCycle[npc.idleCycleIndex];
                        npc.currentSprite = npc.sprites[cycle.sprite];
                        npc.cols = cycle.cols;
                        npc.cellW = cycle.cellW;
                        npc.cellH = cycle.cellH;
                        npc.totalFrames = cycle.totalFrames;
                        npc.idleCycleTimer = cycle.duration;
                        npc.frame = 0;
                        npc.animTimer = 0;
                    }
                }
                npc.animTimer += npc.fps / 60;
                if (npc.animTimer >= 1) {
                    npc.animTimer = 0;
                    npc.frame = (npc.frame + 1) % npc.totalFrames;
                }
                continue;
            }

            // ========== MAITRESSE STATE MACHINE ==========
            // Angry timer (7 seconds = 420 frames)
            if (npc.angrySpeedTimer > 0) {
                npc.angrySpeedTimer--;
                if (npc.angrySpeedTimer <= 0) {
                    npc.speed = npc.baseSpeed;
                    npc.vigilance = 'calm';
                    // Find nearest patrol waypoint to resume patrol
                    if (npc.state === 'walking' || npc.state === 'poursuit') {
                        let nearestIdx = 0;
                        let nearestDist = Infinity;
                        for (let i = 0; i < npc.patrol.length; i++) {
                            const wp = npc.patrol[i];
                            const d = Math.sqrt((wp.x - npc.x) ** 2 + (wp.y - npc.y) ** 2);
                            if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
                        }
                        npc.patrolIndex = nearestIdx;
                        npc.state = 'walking';
                        npc.frame = 0; npc.animTimer = 0;
                        npc.fps = 6;
                    }
                }
            }

            // Check if maitresse is "on screen" — used for solo difficulty parity.
            // Uses the local player's actual viewport (canvas size + camera zoom).
            const halfViewW = canvas.width / (2 * CONFIG.CAMERA_ZOOM);
            const halfViewH = canvas.height / (2 * CONFIG.CAMERA_ZOOM);
            const margin = npc.angrySpeedTimer > 0 ? 30 : 0;
            let maitresseOnScreen;
            if (gameState.mode === 'multi' && remotePlayer.active) {
                // Visible if near EITHER player, using each one's own viewport.
                const halfW2 = remotePlayer.halfW || halfViewW;
                const halfH2 = remotePlayer.halfH || halfViewH;
                const nearLocal = Math.abs(npc.x - player.x) < halfViewW + margin && Math.abs(npc.y - player.y) < halfViewH + margin;
                const nearRemote = Math.abs(npc.x - remotePlayer.x) < halfW2 + margin && Math.abs(npc.y - remotePlayer.y) < halfH2 + margin;
                maitresseOnScreen = nearLocal || nearRemote;
            } else {
                const mOnScreenX = Math.abs(npc.x - camera.x) < halfViewW + margin;
                const mOnScreenY = Math.abs(npc.y - camera.y) < halfViewH + margin;
                maitresseOnScreen = mOnScreenX && mOnScreenY;
            }

            // Helper: "near culprit" = the maitresse is on the culprit's screen.
            // Uses each player's actual viewport size for fair, solo-equivalent detection.
            const culpritOnScreen = () => {
                if (gameState.mode !== 'multi') return maitresseOnScreen;
                let culprit;
                if (npc.angryAt === 'remote') {
                    culprit = remotePlayer;
                } else if (npc.angryAt === 'local') {
                    culprit = player;
                } else {
                    if (!remotePlayer.active) culprit = player;
                    else {
                        const dL = Math.hypot(player.x - npc.x, player.y - npc.y);
                        const dR = Math.hypot(remotePlayer.x - npc.x, remotePlayer.y - npc.y);
                        culprit = dR < dL ? remotePlayer : player;
                    }
                }
                if (!culprit || culprit.active === false) return maitresseOnScreen;
                // Each player has their own viewport. For the local player we use canvas;
                // for the remote we use the halfW/halfH they broadcast (falls back to local).
                let halfW, halfH;
                if (culprit === player) {
                    halfW = canvas.width / (2 * CONFIG.CAMERA_ZOOM);
                    halfH = canvas.height / (2 * CONFIG.CAMERA_ZOOM);
                } else {
                    halfW = culprit.halfW || (canvas.width / (2 * CONFIG.CAMERA_ZOOM));
                    halfH = culprit.halfH || (canvas.height / (2 * CONFIG.CAMERA_ZOOM));
                }
                const margin = npc.angrySpeedTimer > 0 ? 30 : 0;
                return Math.abs(npc.x - culprit.x) < halfW + margin &&
                       Math.abs(npc.y - culprit.y) < halfH + margin;
            };

            // Path is recomputed periodically or when target moved significantly.
            function moveNpcToward(npc, targetX, targetY, moveSpeed) {
                const mdx = targetX - npc.x;
                const mdy = targetY - npc.y;
                const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < 3) return;

                function npcCanMove(x, y) {
                    const hb = { x: x - npc.hitbox.w/2, y: y + npc.hitbox.offsetY - npc.hitbox.h/2, w: npc.hitbox.w, h: npc.hitbox.h };
                    for (const c of getCurrentColliders()) { if (rectsOverlap(hb, c)) return false; }
                    return true;
                }

                // ===== Anti-stuck progress tracker =====
                // Measure how far we've travelled since last "progress check".
                if (npc.lastProgressX === 0 && npc.lastProgressY === 0) {
                    npc.lastProgressX = npc.x; npc.lastProgressY = npc.y;
                }
                const progressDist = Math.hypot(npc.x - npc.lastProgressX, npc.y - npc.lastProgressY);
                npc.stuckTimer++;
                if (progressDist > 18 || npc.stuckTimer > 20) {
                    // Either we moved meaningfully, or it's been long enough to reset measurement
                    if (progressDist < 8 && npc.stuckTimer > 20) {
                        // STUCK: not enough progress in 20 frames → engage commit mode
                        if (!npc.commitDir) {
                            // Pick a side to commit to (orthogonal to target direction)
                            // Prefer the side that has more open space to move in
                            const baseA = Math.atan2(mdy, mdx);
                            let bestSide = 1, bestSpace = 0;
                            for (const s of [-1, 1]) {
                                const a = baseA + s * Math.PI / 2;
                                let openSpace = 0;
                                for (let d = moveSpeed; d <= 60; d += 10) {
                                    if (npcCanMove(npc.x + Math.cos(a) * d, npc.y + Math.sin(a) * d)) {
                                        openSpace = d;
                                    } else break;
                                }
                                if (openSpace > bestSpace) { bestSpace = openSpace; bestSide = s; }
                            }
                            npc.commitDir = bestSide;
                            npc.commitTimer = 30; // commit for 0.5s
                            // Invalidate path - we'll move sideways without A*
                            npc.path = null;
                        }
                    }
                    npc.lastProgressX = npc.x; npc.lastProgressY = npc.y;
                    npc.stuckTimer = 0;
                }

                // ===== Commit mode: forced sideways movement to escape corner =====
                if (npc.commitTimer > 0 && npc.commitDir) {
                    npc.commitTimer--;
                    const baseA = Math.atan2(mdy, mdx);
                    // Try perpendicular first, then slightly bent toward target
                    for (const off of [Math.PI / 2, Math.PI / 3, 5 * Math.PI / 12]) {
                        const a = baseA + npc.commitDir * off;
                        const nx = npc.x + Math.cos(a) * moveSpeed;
                        const ny = npc.y + Math.sin(a) * moveSpeed;
                        if (npcCanMove(nx, ny)) {
                            npc.x = nx; npc.y = ny;
                            return;
                        }
                    }
                    // Even commit direction is blocked → cancel commit, fall through to normal logic
                    npc.commitTimer = 0;
                    npc.commitDir = null;
                }

                // ===== Normal A* pathfinding =====
                const targetMoved = Math.hypot(targetX - npc.pathTargetX, targetY - npc.pathTargetY);
                const needRecompute = !npc.path || npc.pathRecalcTimer <= 0 || targetMoved > 50;
                if (needRecompute) {
                    const raw = findPath(npc.x, npc.y, targetX, targetY);
                    npc.path = raw ? smoothPath(raw, npc.hitbox) : null;
                    npc.pathIndex = 0;
                    npc.pathRecalcTimer = 45; // ~0.75s at 60fps (less frequent recompute = more stable)
                    npc.pathTargetX = targetX;
                    npc.pathTargetY = targetY;
                }
                npc.pathRecalcTimer--;

                if (npc.path && npc.path.length > 0) {
                    while (npc.pathIndex < npc.path.length - 1) {
                        const wp = npc.path[npc.pathIndex];
                        if (Math.hypot(wp.x - npc.x, wp.y - npc.y) < moveSpeed * 1.5) {
                            npc.pathIndex++;
                        } else break;
                    }
                    const wp = npc.path[npc.pathIndex];
                    const wdx = wp.x - npc.x, wdy = wp.y - npc.y;
                    const wdist = Math.hypot(wdx, wdy);
                    if (wdist > 0.1) {
                        const ang = Math.atan2(wdy, wdx);
                        const nx = npc.x + Math.cos(ang) * moveSpeed;
                        const ny = npc.y + Math.sin(ang) * moveSpeed;
                        if (npcCanMove(nx, ny)) {
                            npc.x = nx; npc.y = ny;
                            return;
                        }
                        npc.pathRecalcTimer = 0;
                    }
                }

                // ===== Fallback: direct + angled =====
                const baseAngle = Math.atan2(mdy, mdx);
                const directNx = npc.x + Math.cos(baseAngle) * moveSpeed;
                const directNy = npc.y + Math.sin(baseAngle) * moveSpeed;
                if (npcCanMove(directNx, directNy)) {
                    npc.x = directNx; npc.y = directNy;
                    return;
                }
                for (const off of [Math.PI/4, Math.PI/2, 3*Math.PI/4]) {
                    for (const side of [1, -1]) {
                        const a = baseAngle + side * off;
                        const nx = npc.x + Math.cos(a) * moveSpeed;
                        const ny = npc.y + Math.sin(a) * moveSpeed;
                        if (npcCanMove(nx, ny)) {
                            npc.x = nx; npc.y = ny;
                            return;
                        }
                    }
                }
            }

            // Helper: find nearest patrol waypoint
            function findNearestWaypoint() {
                let nearestIdx = 0, nearestDist = Infinity;
                for (let i = 0; i < npc.patrol.length; i++) {
                    const wp = npc.patrol[i];
                    const d = Math.sqrt((wp.x - npc.x) ** 2 + (wp.y - npc.y) ** 2);
                    if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
                }
                npc.patrolIndex = nearestIdx;
            }

            // Helper: switch to walking patrol
            function resumePatrol(fast) {
                findNearestWaypoint();
                npc.state = 'walking';
                npc.speed = fast ? npc.baseSpeed * 2.5 : npc.baseSpeed;
                npc.frame = 0; npc.animTimer = 0; npc.fps = 6;
                // Force fresh A* computation for the new patrol leg
                npc.path = null; npc.pathRecalcTimer = 0;
                npc._patrolStuck = 0;
                // Reset chase sprite smoothing so next chase starts clean
                npc._chaseDx = 0; npc._chaseDy = 0; npc._chaseCat = undefined;
                // Clear angryAt so a future provocation isn't blamed on the previous culprit.
                npc.angryAt = null;
            }

            if (npc.state === 'glisse') {
                const gInfo = glisseSpriteFor(npc, npc.slideKind || 'h');
                npc.currentSprite = gInfo.sprite;
                npc.totalFrames = gInfo.frames;
                npc.fps = 10;
                npc.slideLife--;
                const gx = npc.x + npc.slideDx;
                const gy = npc.y + npc.slideDy;
                const ghb = { x: gx - npc.hitbox.w/2, y: gy + npc.hitbox.offsetY - npc.hitbox.h/2, w: npc.hitbox.w, h: npc.hitbox.h };
                let gBlocked = false;
                for (const c of getCurrentColliders()) { if (rectsOverlap(ghb, c)) { gBlocked = true; break; } }
                if (!gBlocked) { npc.x = gx; npc.y = gy; }
                else { npc.slideLife = 0; }
                if (npc.slideLife <= 0) {
                    npc.state = 'tombe';
                    npc.currentSprite = tombeSpriteFor(npc, npc.slideKind || 'h');
                    npc.totalFrames = 6;
                    npc.fps = 8;
                    npc.frame = 0; npc.animTimer = 0;
                    npc.tombeTimer = 180;
                    stopGlisseSound();
                    playSound('tombe');
                    // Award points based on combo. combo=0 means it was a passive slip
                    // on a dropped item (no Titeuf throw chained), so no score awarded.
                    //   1 throw  -> +2
                    //   2 throws -> +16 (×8 per item)
