            const ratio = Math.max(cw / bg.width, ch / bg.height);
            const dw = bg.width * ratio;
            const dh = bg.height * ratio;
            const finalY = (ch - dh) / 2;
            const startY = -dh;
            const dy = startY + (finalY - startY) * ease;
            const bgX = (cw - dw) / 2;
            ctx.drawImage(bg, bgX, dy, dw, dh);

            // Once the slide animation is finished AND we're in multi mode,
            // overlay the player score table in the empty middle area.
            if (gameState.victoireAnim >= 1 && gameState.mode === 'multi'
                && gameState.victoirePlayers && gameState.victoirePlayers.length > 0) {
                renderVictoireTable(cw, ch);
            }
        }

        // Bottom instruction (after animation done)
        if (gameState.victoireAnim >= 1) {
            ctx.font = 'bold ' + Math.floor(ch * 0.03) + 'px "Comic Sans MS", cursive';
            ctx.fillStyle = '#5a2a8c';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('A pour continuer  \u2014  B pour menu', cw / 2, ch * 0.95);
        }
    }

    // Score table for multi victory screen: avatar | nickname | score / 8 [coupe]
    function renderVictoireTable(cw, ch) {
        const players = gameState.victoirePlayers;
        const tableW = Math.min(cw * 0.55, 620);
        const rowH = Math.max(70, ch * 0.10);
        const rowGap = 10;
        const totalH = players.length * rowH + (players.length - 1) * rowGap;
        const tableX = (cw - tableW) / 2;
        // Center vertically in the empty space (roughly middle-lower of screen)
        const tableY = ch * 0.50 - totalH / 2;

        for (let i = 0; i < players.length; i++) {
            const p = players[i];
            const ry = tableY + i * (rowH + rowGap);
            // Row background
            ctx.fillStyle = i === 0 ? '#fff4b8' : '#f0d878';
            ctx.strokeStyle = '#5a2a8c';
            ctx.lineWidth = 4;
            roundRect(ctx, tableX, ry, tableW, rowH, 12);
            ctx.fill();
            ctx.stroke();

            // Avatar (Titeuf head)
            const avSize = rowH * 0.80;
            const avX = tableX + 12;
            const avY = ry + (rowH - avSize) / 2;
            if (images.hud_tete) {
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(images.hud_tete, avX, avY, avSize, avSize);
            }

            // Nickname
            ctx.font = 'bold ' + Math.floor(rowH * 0.36) + 'px "Comic Sans MS", cursive';
            ctx.fillStyle = '#5a2a8c';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const nickX = avX + avSize + 16;
            ctx.fillText(p.nickname, nickX, ry + rowH / 2);

            // Score "X / 8" + coupe icon (right-aligned)
            const coupeSize = rowH * 0.55;
            const rightPad = 16;
            const coupeX = tableX + tableW - rightPad - coupeSize;
            const coupeY = ry + (rowH - coupeSize) / 2;
            if (images.hud_coupe) {
                ctx.drawImage(images.hud_coupe, coupeX, coupeY, coupeSize, coupeSize);
            }
            ctx.font = 'bold ' + Math.floor(rowH * 0.38) + 'px "Comic Sans MS", cursive';
            ctx.fillStyle = '#5a2a8c';
            ctx.textAlign = 'right';
            ctx.fillText(p.score + ' / 8', coupeX - 8, ry + rowH / 2);

            // "1er" / "2e" rank badge in front of the row
            if (i === 0 && players.length > 1) {
                ctx.font = 'bold ' + Math.floor(rowH * 0.30) + 'px "Comic Sans MS", cursive';
                ctx.fillStyle = '#c00';
                ctx.textAlign = 'right';
                ctx.fillText('1er', avX + avSize - 4, ry + rowH * 0.18);
            }
        }
    }

    // Restart music from beginning (used when entering defi screen)
    function restartMusicFromStart() {
        // Play the music appropriate for the current map; stop the other map's music.
        const classeMusic = sounds.music_classe;
        const cuisineMusic = sounds.music_cuisine;
        const isKitchen = currentMap === 'cuisine';
        const active = isKitchen ? cuisineMusic : classeMusic;
        const inactive = isKitchen ? classeMusic : cuisineMusic;
        // Stop the other one
        if (inactive) {
            try { inactive.pause(); inactive.currentTime = 0; } catch (_) {}
        }
        // Play the active one from start
        if (active) {
            try {
                active.currentTime = 0;
                active.play().catch(() => {});
            } catch (_) {}
        }
        musicStarted = true;
    }

    // Reset the game world and transition to playing.
    // In multi mode, players spawn at different positions based on host/joiner role.
    function startGame() {
        // Make sure we're on the classroom map (in case we just came from kitchen)
        currentMap = 'classe';
        setActiveNpcForMap('classe');
        if (gameState.mode === 'multi') {
            if (net.isHost) {
                player.x = 350; player.y = 280;
                remotePlayer.x = 450; remotePlayer.y = 280;
            } else {
                player.x = 450; player.y = 280;
                remotePlayer.x = 350; remotePlayer.y = 280;
            }
            remotePlayer.active = true;
        } else {
            player.x = 350; player.y = 280;
            remotePlayer.active = false;
        }
        // Reset gameplay state
        player.health = 3;
        player.score = 0;
        player.panique = false;
        player.mashCount = 0;
        player.gifleActive = false;
        player.headBlink = 0;
        player.scorePopup = null;
        remotePlayer.score = 0;
        remotePlayer.health = 3;
        gameState.victoireAnim = 0;
        gameState.victoirePlayers = [];
        inventory.item = null;
        inventory.owned = [];
        inventory.showAnimActive = false;
        // Reset world items
        for (const item of worldItems) {
            item.x = item.spawnX; item.y = item.spawnY;
            item.picked = false;
            item.dropped = false;
            item.droppedBy = null;
            item.respawnTimer = 0;
            item.pickupCooldown = 0;
        }
        // Reset health pickup
        healthPickup.picked = false;
        healthPickup.respawnTimer = 0;
        // Reset NPCs
        for (const npc of npcs) {
            if (!npc.patrol) continue;
            npc.state = 'idle';
            npc.patrolIndex = 0;
            npc.waitTimer = 180;
            npc.vigilance = 'calm';
            npc.angrySpeedTimer = 0;
            npc.path = null;
            npc.comboCount = 0;
            npc.x = npc.patrol[0].x;
            npc.y = npc.patrol[0].y;
        }
        gameState.screen = 'game';
    }

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const elapsed = timestamp - lastTime;
        lastTime = timestamp;
        accumulator += elapsed;
        while (accumulator >= FRAME_TIME) {
            if (gameState.screen === 'menu') updateMenu(FRAME_TIME);
            else if (gameState.screen === 'lobby') updateLobby(FRAME_TIME);
            else if (gameState.screen === 'defi') updateDefi(FRAME_TIME);
            else if (gameState.screen === 'victoire') updateVictoire(FRAME_TIME);
            else update(FRAME_TIME);
            accumulator -= FRAME_TIME;
        }
        if (gameState.screen === 'menu') renderMenu();
        else if (gameState.screen === 'lobby') renderLobby();
        else if (gameState.screen === 'defi') renderDefi();
        else if (gameState.screen === 'victoire') renderVictoire();
        else render();
        requestAnimationFrame(gameLoop);
    }

    async function init() {
        resize();
        loadSounds();
        await loadImages();
        startMusic(); // try immediate; if blocked by autoplay policy, the keyboard/gamepad fallbacks remain
        requestAnimationFrame(gameLoop);
    }

    init();
})();
</script>
</body>
</html>
