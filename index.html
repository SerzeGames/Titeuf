                    //   N throws -> N * 8 if N >= 2
                    const n = npc.comboCount || 0;
                    if (n > 0) {
                        const pts = n === 1 ? 2 : n * 8;
                        if (gameState.mode === 'multi') {
                            // Award to whoever provoked the slide
                            if (npc.angryAt === 'remote') {
                                // The joiner scored: tell them to add points + popup,
                                // and locally show a popup over their (remote) Titeuf.
                                netSend({ type: 'score_event', pts: pts });
                                remotePlayer.scorePopup = { text: '+' + pts, timer: 180 };
                            } else {
                                // Host scored.
                                player.score += pts;
                                player.scorePopup = { text: '+' + pts, timer: 180 };
                                // Tell the joiner to display a popup over our Titeuf too.
                                netSend({ type: 'remote_score_popup', pts: pts });
                            }
                        } else {
                            player.score += pts;
                            player.scorePopup = { text: '+' + pts, timer: 180 };
                        }
                    }
                    npc.comboCount = 0;
                }
            } else if (npc.state === 'tombe') {
                npc.currentSprite = tombeSpriteFor(npc, npc.slideKind || 'h');
                // Tombe sprite frame count depends on NPC (maitresse: 6+2empty=8, francois: 4).
                // We freeze on the LAST filled frame so the NPC stays visibly down.
                const tombeFrames = npc.tombeFrames || 6;
                npc.totalFrames = tombeFrames;
                npc.fps = 8;
                if (npc.frame >= tombeFrames - 1) npc.frame = tombeFrames - 1;
                npc.tombeTimer--;
                if (npc.tombeTimer <= 0) {
                    npc.angrySpeedTimer = 420;
                    npc.vigilance = 'angry';
                    if (culpritOnScreen()) {
                        npc.state = 'poursuit';
                    } else {
                        resumePatrol(true);
                    }
                    npc.slideKind = 'h';
                    npc.frame = 0; npc.animTimer = 0;
                    npc.fps = 6;
                }
            } else if (npc.state === 'poursuit') {
                // Multi: refresh chase target sticky logic
                updateChaseTarget(npc);
                const target = getChaseTarget(npc);
                const pdx = target.x - npc.x;
                const pdy = target.y - npc.y;
                const pdist = Math.sqrt(pdx * pdx + pdy * pdy);

                npc.totalFrames = 4; npc.fps = 12;
                npc.vigilance = 'angry';

                // Move toward target with obstacle avoidance, then derive sprite from
                // the ACTUAL movement (so when going around an obstacle, the horizontal
                // poursuit sprite plays during the longe-phase).
                const chaseMul = npc.chaseSpeedMultiplier || 3.7;
                const pSpeed = npc.baseSpeed * chaseMul;
                const beforeX = npc.x, beforeY = npc.y;
                moveNpcToward(npc, target.x, target.y, pSpeed);
                const realDx = npc.x - beforeX;
                const realDy = npc.y - beforeY;
                const realLen = Math.sqrt(realDx * realDx + realDy * realDy);

                if (realLen < 0.1) {
                    // No movement: keep current sprite, facing based on target direction
                    npc.facingLeft = pdx < 0;
                } else {
                    // Smooth the actual movement vector over time to avoid sprite
                    // flicker when pathfinding makes small lateral adjustments frame
                    // by frame. EMA with alpha=0.15 = ~6-frame effective window.
                    npc._chaseDx = (npc._chaseDx || 0) * 0.85 + realDx * 0.15;
                    npc._chaseDy = (npc._chaseDy || 0) * 0.85 + realDy * 0.15;
                    const sDx = npc._chaseDx;
                    const sDy = npc._chaseDy;
                    const absRdx = Math.abs(sDx);
                    const absRdy = Math.abs(sDy);
                    const ratio = absRdx === 0 ? Infinity : absRdy / absRdx;

                    // Hysteresis: keep the previous sprite category until we leave a
                    // "safe band" around the threshold. Cat 0 = horizontal, 1 = diag,
                    // 2 = vertical.
                    const prevCat = npc._chaseCat;
                    let cat;
                    if (prevCat === undefined) {
                        // First time: simple thresholds
                        cat = ratio > 2.5 ? 2 : ratio > 0.4 ? 1 : 0;
                    } else {
                        // Sticky thresholds: need a bigger change to switch category
                        if (prevCat === 0) cat = ratio > 0.55 ? 1 : 0;
                        else if (prevCat === 1) cat = ratio > 2.8 ? 2 : (ratio < 0.30 ? 0 : 1);
                        else /* prevCat === 2 */ cat = ratio < 2.2 ? 1 : 2;
                    }
                    npc._chaseCat = cat;

                    if (cat === 2) {
                        npc.currentSprite = sDy > 0 ? npc.sprites.poursuit_bas : npc.sprites.poursuit_haut;
                    } else if (cat === 1) {
                        npc.currentSprite = sDy > 0 ? npc.sprites.poursuit_diag_bas : npc.sprites.poursuit_diag_haut;
                    } else {
                        npc.currentSprite = npc.sprites.poursuit;
                    }
                    npc.facingLeft = sDx < 0;
                }

                // Caught target? Rectangle-based check
                const reachW = 56, reachH = 56;
                const giflerHb = {
                    x: npc.x - reachW / 2,
                    y: npc.y + npc.hitbox.offsetY - reachH / 2,
                    w: reachW,
                    h: reachH,
                };
                const targetHb = playerHitbox(target.x, target.y);
                if (rectsOverlap(giflerHb, targetHb)) {
                    npc.state = 'gifle';
                    npc.frame = 0; npc.animTimer = 0;
                    npc.tombeTimer = 48;
                    // Apply damage to the right player; play gifle sound on both sides.
                    if (target === player) {
                        player.gifleActive = true;
                        player.gifleTimer = 48;
                        player.health = Math.max(0, player.health - 1);
                        player.headBlink = 120;
                        player.frame = 0; player.animTimer = 0;
                        // We're slapped: broadcast so the peer hears it too.
                        broadcastSound('gifle');
                    } else {
                        // Target is the remote player. Notify them; the world_event
                        // will play the sound on their side, so we just play locally here.
                        netSend({ type: 'world_event', event: 'gifle_remote' });
                        playSound('gifle');
                    }
                }

                // Target off screen (from THEIR own viewport): switch to angry patrol.
                let stillVisible = maitresseOnScreen;
                if (gameState.mode === 'multi') {
                    const t = target;
                    let halfW, halfH;
                    if (t === player) {
                        halfW = halfViewW; halfH = halfViewH;
                    } else {
                        halfW = t.halfW || halfViewW;
                        halfH = t.halfH || halfViewH;
                    }
                    stillVisible = Math.abs(npc.x - t.x) < halfW + margin &&
                                   Math.abs(npc.y - t.y) < halfH + margin;
                }
                if (!stillVisible) {
                    resumePatrol(true);
                }
            } else if (npc.state === 'gifle') {
                npc.currentSprite = npc.sprites.gifle;
                npc.totalFrames = 4; npc.fps = 5;
                npc.tombeTimer--;
                if (npc.tombeTimer <= 0) {
                    // Reset to calm patrol - find nearest waypoint
                    resumePatrol(false);
                    npc.vigilance = 'calm';
                    npc.angrySpeedTimer = 0;
                    npc.speed = npc.baseSpeed;
                }
            } else if (npc.state === 'idle') {
                const target = npc.patrol[npc.patrolIndex];
                npc.currentSprite = npc.sprites.idle;
                npc.totalFrames = npc.idleFrames;
                npc.waitTimer--;
                // Resume patrol as soon as the idle animation has played through once,
                // OR when the configured waitTimer expires (whichever comes first).
                const animDone = npc.frame >= npc.totalFrames - 1;
                if (animDone || npc.waitTimer <= 0) {
                    npc.state = 'walking';
                    npc.patrolIndex = (npc.patrolIndex + 1) % npc.patrol.length;
                    npc.frame = 0; npc.animTimer = 0;
                }
                // If angry and player appears on screen, pursue!
                if (npc.angrySpeedTimer > 0 && culpritOnScreen()) {
                    npc.state = 'poursuit';
                    npc.frame = 0; npc.animTimer = 0;
                }
            } else {
                // Walking patrol
                const target = npc.patrol[npc.patrolIndex];
                const dx = target.x - npc.x;
                const dy = target.y - npc.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < npc.speed) {
                    npc.x = target.x; npc.y = target.y;
                    // Skip idle pauses when she's still in "angry" patrol speed
                    if (target.wait && npc.angrySpeedTimer <= 0) {
                        npc.state = 'idle';
                        npc.waitTimer = target.wait;
                        npc.frame = 0; npc.animTimer = 0;
                    } else {
                        npc.patrolIndex = (npc.patrolIndex + 1) % npc.patrol.length;
                    }
                    npc._patrolStuck = 0;
                    npc.path = null;
                } else {
                    // Default: simple direct movement (fast, predictable). Only fall back
                    // to smart A* pathfinding if Titeuf actually gets stuck (e.g. pinned
                    // against a desk after a chase ended).
                    const ndx = dx / dist;
                    const ndy = dy / dist;
                    const nx = npc.x + ndx * npc.speed;
                    const ny = npc.y + ndy * npc.speed;
                    const hb = { x: nx - npc.hitbox.w/2, y: ny + npc.hitbox.offsetY - npc.hitbox.h/2, w: npc.hitbox.w, h: npc.hitbox.h };
                    let blocked = false;
                    for (const c of getCurrentColliders()) { if (rectsOverlap(hb, c)) { blocked = true; break; } }

                    let movedDx = 0, movedDy = 0;
                    if (!blocked) {
                        npc.x = nx; npc.y = ny;
                        movedDx = ndx * npc.speed; movedDy = ndy * npc.speed;
                        npc._patrolStuck = 0;
                        npc.path = null; // healthy direct movement, drop any stale A* path
                    } else {
                        // Try axis sliding
                        const hbX = { x: nx - npc.hitbox.w/2, y: npc.y + npc.hitbox.offsetY - npc.hitbox.h/2, w: npc.hitbox.w, h: npc.hitbox.h };
                        const hbY = { x: npc.x - npc.hitbox.w/2, y: ny + npc.hitbox.offsetY - npc.hitbox.h/2, w: npc.hitbox.w, h: npc.hitbox.h };
                        let xOk = true, yOk = true;
                        for (const c of getCurrentColliders()) { if (rectsOverlap(hbX, c)) { xOk = false; break; } }
                        for (const c of getCurrentColliders()) { if (rectsOverlap(hbY, c)) { yOk = false; break; } }
                        if (xOk) { npc.x = nx; movedDx = ndx * npc.speed; }
                        else if (yOk) { npc.y = ny; movedDy = ndy * npc.speed; }
                    }

                    // Detect if we're stuck (basic move + slide both failed or near-zero)
                    const moveLen = Math.hypot(movedDx, movedDy);
                    if (moveLen < 0.3) {
                        npc._patrolStuck = (npc._patrolStuck || 0) + 1;
                    } else {
                        npc._patrolStuck = 0;
                    }

                    // After ~10 frames stuck, switch to A* pathfinding to contour the obstacle
                    if (npc._patrolStuck > 10) {
                        const beforeX = npc.x, beforeY = npc.y;
                        moveNpcToward(npc, target.x, target.y, npc.speed);
                        movedDx = npc.x - beforeX;
                        movedDy = npc.y - beforeY;
                        // If even A* can't help for too long, skip to next waypoint
                        if (npc._patrolStuck > 90) {
                            npc.patrolIndex = (npc.patrolIndex + 1) % npc.patrol.length;
                            npc._patrolStuck = 0;
                            npc.path = null;
                        }
                    }

                    // Sprite from actual movement (so longing the wall shows walk_h)
                    const realLen = Math.hypot(movedDx, movedDy);
                    if (realLen > 0.1) {
                        const absRdx = Math.abs(movedDx);
                        const absRdy = Math.abs(movedDy);
                        if (absRdy > absRdx) {
                            npc.currentSprite = movedDy > 0 ? npc.sprites.walk_down : npc.sprites.walk_up;
                        } else {
                            npc.currentSprite = npc.sprites.walk_h;
                        }
                        npc.facingLeft = movedDx < 0;
                    } else {
                        // Idle-ish: keep current sprite, face toward target
                        npc.facingLeft = dx < 0;
                    }
                    npc.totalFrames = npc.walkFrames;
                }

                // If angry and player appears on screen, pursue!
                if (npc.angrySpeedTimer > 0 && culpritOnScreen()) {
                    npc.state = 'poursuit';
                    npc.frame = 0; npc.animTimer = 0;
                }
            }

            // Animate
            npc.animTimer += npc.fps / 60;
            if (npc.animTimer >= 1) {
                npc.animTimer = 0;
                if (npc.state === 'tombe') {
                    // Stop on last filled tombe frame (varies by NPC).
                    const tombeFrames = npc.tombeFrames || 6;
                    if (npc.frame < tombeFrames - 1) {
                        npc.frame++;
                    }
                } else if (npc.state === 'gifle' || npc.state === 'idle') {
                    // Play once, stop on last frame
                    if (npc.frame < npc.totalFrames - 1) {
                        npc.frame++;
                    }
                } else {
                    npc.frame = (npc.frame + 1) % npc.totalFrames;
                }
            }

            // Vigilance: per-player in multi, single value in solo.
            // angryAt is set when someone hits her and persists during angry timer.
            if (npc.angrySpeedTimer > 0) {
                // Only the player who made her angry sees red; the other sees calm/alert based on his own visibility
                const angryTag = npc.angryAt || 'local';
                if (gameState.mode === 'multi') {
                    npc.vigilanceLocal = (angryTag === 'local') ? 'angry' : 'calm';
                    npc.vigilanceRemote = (angryTag === 'remote') ? 'angry' : 'calm';
                    // For the angry target, even calm vigilance doesn't apply (she's red).
                    // For the other player, compute alert/calm normally based on visibility.
                    const computeAlert = (t) => {
                        if (!t) return 'calm';
                        const vdx = t.x - npc.x, vdy = t.y - npc.y;
                        const vdist = Math.sqrt(vdx*vdx + vdy*vdy);
                        if (vdist >= npc.vigilanceRadius) return 'calm';
                        const sprite = npc.currentSprite || '';
                        const isPureUp = sprite.includes('walk_up') || (sprite.includes('poursuit_haut') && !sprite.includes('poursuit_diag_haut'));
                        const isPureDown = sprite.includes('walk_down') || (sprite.includes('poursuit_bas') && !sprite.includes('poursuit_diag_bas'));
                        let inFront;
                        if (isPureUp) inFront = vdy < 0;
                        else if (isPureDown) inFront = vdy > 0;
                        else inFront = npc.facingLeft ? vdx < 0 : vdx > 0;
                        return inFront ? 'alert' : 'calm';
                    };
                    if (angryTag !== 'local') npc.vigilanceLocal = computeAlert(player);
                    if (angryTag !== 'remote' && remotePlayer.active) npc.vigilanceRemote = computeAlert(remotePlayer);
                    // Backward compat
                    npc.vigilance = npc.vigilanceLocal;
                } else {
                    npc.vigilance = 'angry';
                }
            } else if (npc.state !== 'glisse' && npc.state !== 'tombe') {
                if (npc.vigilanceRadius) {
                    const computeAlert = (t) => {
                        if (!t) return 'calm';
                        const vdx = t.x - npc.x, vdy = t.y - npc.y;
                        const vdist = Math.sqrt(vdx*vdx + vdy*vdy);
                        if (vdist >= npc.vigilanceRadius) return 'calm';
                        const sprite = npc.currentSprite || '';
                        const isPureUp = sprite.includes('walk_up') || (sprite.includes('poursuit_haut') && !sprite.includes('poursuit_diag_haut'));
                        const isPureDown = sprite.includes('walk_down') || (sprite.includes('poursuit_bas') && !sprite.includes('poursuit_diag_bas'));
                        let inFront;
                        if (isPureUp) inFront = vdy < 0;
                        else if (isPureDown) inFront = vdy > 0;
                        else inFront = npc.facingLeft ? vdx < 0 : vdx > 0;
                        return inFront ? 'alert' : 'calm';
                    };
                    if (gameState.mode === 'multi') {
                        npc.vigilanceLocal = computeAlert(player);
                        npc.vigilanceRemote = remotePlayer.active ? computeAlert(remotePlayer) : 'calm';
                        npc.vigilance = npc.vigilanceLocal;
                    } else {
                        npc.vigilance = computeAlert(player);
                    }
                }
            }
        }
        } // end else (host NPC simulation)

        // ========== NPC SLIPPING ON DROPPED ITEMS ==========
        // If an NPC walks over a world item while moving (walking/poursuit),
        // it slips and slides in the direction it was moving.
        // Host-only: joiner just receives state.
        if (!skipNpcSim) {
        for (const npc of npcs) {
            if (!npc.patrol) continue;
            // Only slip if currently moving with intent
            if (npc.state !== 'walking' && npc.state !== 'poursuit') continue;
            // Need a recent movement direction (compute from last position)
            if (npc._lastX === undefined) { npc._lastX = npc.x; npc._lastY = npc.y; continue; }
            const moveDx = npc.x - npc._lastX;
            const moveDy = npc.y - npc._lastY;
            const moveLen = Math.hypot(moveDx, moveDy);
            npc._lastX = npc.x; npc._lastY = npc.y;
            if (moveLen < 0.3) continue; // not really moving

            // Check collision with any picked-up-able world item
            const npcHb = { x: npc.x - 18, y: npc.y - 12, w: 36, h: 24 };
            for (const item of worldItems) {
                if (item.picked) continue;
                // Only items that Titeuf has dropped/thrown act as traps.
                // The item sitting at its initial spawn point is not slippery.
                if (!item.dropped) continue;
                const itemHb = { x: item.x - item.size/2, y: item.y - item.size/2, w: item.size, h: item.size };
                if (!rectsOverlap(npcHb, itemHb)) continue;

                // SLIP! Trigger glisse in current movement direction
                const norm = 1 / moveLen;
                const slipDx = moveDx * norm;
                const slipDy = moveDy * norm;
                npc.state = 'glisse';
                npc.slideKind = slideKindFor(slipDx, slipDy);
                const gInfo = glisseSpriteFor(npc, npc.slideKind);
                npc.currentSprite = gInfo.sprite;
                npc.totalFrames = gInfo.frames;
                npc.frame = 0; npc.animTimer = 0; npc.fps = 10;
                npc.slideDx = slipDx * 3;
                npc.slideDy = slipDy * 3;
                npc.slideLife = 45;
                if (slipDx !== 0) npc.facingLeft = slipDx < 0;
                // A dropped trap is a deliberate Titeuf action: it counts as a combo hit.
                npc.comboCount = (npc.comboCount || 0) + 1;
                // Blame the player who placed this trap (not whoever is closest).
                // Default to 'local' if untagged (e.g. solo mode).
                npc.angryAt = item.droppedBy || 'local';
                // Item disappears, schedule respawn
                item.picked = true;
                item.respawnTimer = -1; // -1 = wait for NPC recovery
                startGlisseSound();
                break;
            }
        }
        } // end if !skipNpcSim (slipping)

        // ========== WORLD ITEM RESPAWN ==========
        // Items that hit a NPC (thrown or trap) reappear at their spawn point
        // once no NPC is in glisse/tombe state anymore.
        for (const item of worldItems) {
            if (!item.picked) continue;
            if (item.respawnTimer === -1) {
                // Wait for all NPCs to recover from glisse/tombe
                let anyRecovering = false;
                for (const n of npcs) {
                    if (n.state === 'glisse' || n.state === 'tombe') { anyRecovering = true; break; }
                }
                if (!anyRecovering) {
                    item.respawnTimer = 180; // 3s grace then respawn
                }
            } else if (item.respawnTimer > 0) {
                item.respawnTimer--;
                if (item.respawnTimer === 0) {
                    item.x = item.spawnX;
                    item.y = item.spawnY;
                    item.picked = false;
                    item.dropped = false;
                    item.droppedBy = null;
                }
            }
        }

        // ========== ITEMS ==========
        // Pickup: check if player is near a world item.
        // Each item has its own pickupCooldown (set when Titeuf drops it) so he doesn't
        // Items: pickup detection.
        // Note: the host is authoritative for the world state, but the joiner detects
        // its own collisions locally for snappy response. Once picked locally, we set
        // a small _localPickCooldown so the next world_state messages (which may
        // arrive before the host has processed our request_pickup) don't reset
        // item.picked to false and re-trigger the pickup -> sound spam.
        for (const item of worldItems) {
            if (item.pickupCooldown > 0) item.pickupCooldown--;
            if (item._localPickCooldown > 0) item._localPickCooldown--;
            if (item.picked) continue;
            if (item.pickupCooldown > 0) continue;
            const dx = player.x - item.x;
            const dy = player.y - item.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 45) {
                item.picked = true;
                item.dropped = false;
                item.droppedBy = null;
                if (!inventory.owned.includes(item.id)) inventory.owned.push(item.id);
                inventory.item = item.id;
                inventory.showAnim = 0;
                inventory.showAnimActive = true;
                broadcastSound('loot');
                // Multi: notify the other side. Joiner asks host to mark as picked;
                // host broadcasts via world_state automatically.
                if (gameState.mode === 'multi' && !net.isHost) {
                    item._localPickCooldown = 60; // 1s guard against stale world_state
                    netSend({ type: 'request_pickup', itemId: item.id });
                }
            }
        }

        // Health pickup: heals 1 HP up to 3 max, then disappears for 60s.
        // In multi mode the host is authoritative: only the host runs the respawn timer
        // and decides when the pickup is available again. The joiner just reacts to
        // healthPickup.picked received via world_state.
        const hostsThisPickup = (gameState.mode !== 'multi') || net.isHost;
        if (healthPickup.pickupCooldown > 0) healthPickup.pickupCooldown--;
        if (healthPickup._localPickCooldown > 0) healthPickup._localPickCooldown--;
        if (healthPickup.picked) {
            if (hostsThisPickup) {
                healthPickup.respawnTimer--;
                if (healthPickup.respawnTimer <= 0) {
                    healthPickup.picked = false;
                }
            }
        } else if (healthPickup.pickupCooldown <= 0) {
            const hdx = player.x - healthPickup.x;
            const hdy = player.y - healthPickup.y;
            const hdist = Math.sqrt(hdx * hdx + hdy * hdy);
            if (hdist < 45 && player.health < 3) {
                player.health = Math.min(3, player.health + 1);
                healthPickup.picked = true;
                healthPickup.respawnTimer = healthPickup.respawnDuration;
                healthPickup.pickupCooldown = 30; // half a second guard
                broadcastSound('loot');
                if (gameState.mode === 'multi' && !net.isHost) {
                    healthPickup._localPickCooldown = 60; // 1s guard against stale world_state
                    netSend({ type: 'request_health_pickup' });
                }
            }
        }

        // Inventory slide-up animation
        if (inventory.showAnimActive) {
            inventory.showAnim += 0.04;
            if (inventory.showAnim >= 1) {
                inventory.showAnim = 1;
                inventory.showAnimActive = false;
            }
        }

        // Switch held item with RB/LB (gamepad) or BracketRight/BracketLeft (keyboard).
        // Only meaningful when Titeuf has 2+ items in his inventory.
        const rbPressed = (gamepad.rb && !gamepad.rbPrev) || (keys['BracketRight'] && !keys['_prevBR']);
        const lbPressed = (gamepad.lb && !gamepad.lbPrev) || (keys['BracketLeft'] && !keys['_prevBL']);
        keys['_prevBR'] = keys['BracketRight'];
        keys['_prevBL'] = keys['BracketLeft'];
        if ((rbPressed || lbPressed) && inventory.owned.length > 1) {
            const idx = inventory.owned.indexOf(inventory.item);
            const dir = rbPressed ? 1 : -1;
            const next = (idx + dir + inventory.owned.length) % inventory.owned.length;
            inventory.item = inventory.owned[next];
            // Re-trigger the slide-up so the player sees a feedback
            inventory.showAnim = 0.5;
            inventory.showAnimActive = true;
            playSound('loot');
        }

        // Throw with A key or gamepad A (on press, not hold)
        const aPressed = (keys['KeyA'] && !keys['_prevA']) || (gamepad.a && !gamepad.aPrev);
        keys['_prevA'] = keys['KeyA'];

        if (aPressed && inventory.item) {
            // In panique mode: drop the item as a trap on the floor instead of throwing.
            // Any NPC walking onto it will slide.
            if (player.panique) {
                // Drop slightly in front of player, fall back to player position if blocked
                const ld = player.lastDirection;
                let dropDx = 0, dropDy = 0;
                if (ld === 'down') dropDy = 1;
                else if (ld === 'up') dropDy = -1;
                else if (ld === 'diag_haut') { dropDx = player.facingLeft ? -1 : 1; dropDy = -1; }
                else if (ld === 'diag_bas') { dropDx = player.facingLeft ? -1 : 1; dropDy = 1; }
                else dropDx = player.facingLeft ? -1 : 1;
                if (dropDx !== 0 && dropDy !== 0) {
                    const inv = 1 / Math.SQRT2;
                    dropDx *= inv; dropDy *= inv;
                }
                let px = player.x + dropDx * 25;
                let py = player.y + dropDy * 25;
                const hb = { x: px - 12, y: py - 6, w: 24, h: 12 };
                let blocked = false;
                for (const c of getCurrentColliders()) {
                    if (rectsOverlap(hb, c)) { blocked = true; break; }
                }
                if (blocked) { px = player.x; py = player.y; }

                // The entry already exists in worldItems (Titeuf just picked it up).
                // Just put it back on the floor as a trap.
                const entry = worldItems.find(w => w.id === inventory.item);
                if (entry) {
                    entry.x = px; entry.y = py;
                    entry.picked = false;
                    entry.respawnTimer = 0;
                    entry.dropped = true;
                    // Mark THIS player as the one who placed the trap, so when the
                    // NPC trips on it later we blame the right player (even if they
                    // already walked far away / off the NPC's screen).
                    entry.droppedBy = 'local';
                    entry.pickupCooldown = 60;
                    // Multi sync
                    if (gameState.mode === 'multi' && !net.isHost) {
                        // Lock position locally for a moment to ignore stale host snapshots
                        entry._localDropCooldown = 60;
                        entry._netTargetX = px;
                        entry._netTargetY = py;
                        netSend({ type: 'request_drop', itemId: entry.id, x: px, y: py });
                    }
                }
                inventoryRemoveCurrent();
                inventory.showAnim = 0;
                inventory.showAnimActive = inventory.item !== null;
                broadcastSound('drop');
            } else {
            // Determine throw direction based on player facing
            let throwDx = 0, throwDy = 0;
            const ld = player.lastDirection;
            if (ld === 'down') { throwDy = 1; }
            else if (ld === 'up') { throwDy = -1; }
            else if (ld === 'diag_haut') {
                throwDx = player.facingLeft ? -1 : 1;
                throwDy = -1;
            } else if (ld === 'diag_bas') {
                throwDx = player.facingLeft ? -1 : 1;
                throwDy = 1;
            } else {
                throwDx = player.facingLeft ? -1 : 1;
            }
            // Normalize diagonal
            if (throwDx !== 0 && throwDy !== 0) {
                const inv = 1 / Math.SQRT2;
                throwDx *= inv;
                throwDy *= inv;
            }

            // Spawn item a bit in front of player
            let spawnX = player.x + throwDx * 20;
            let spawnY = player.y + throwDy * 20;
            // Make sure spawn point is not inside a collider
            const spawnHb = { x: spawnX - 12, y: spawnY - 6, w: 24, h: 12 };
            let spawnBlocked = false;
            for (const c of getCurrentColliders()) {
                if (rectsOverlap(spawnHb, c)) { spawnBlocked = true; break; }
            }
            if (spawnBlocked) {
                // Fall back to player position
                spawnX = player.x;
                spawnY = player.y;
            }

            // Use sprite and size from the world item entry instead of hardcoding voiture.
            const heldEntry = worldItems.find(w => w.id === inventory.item);
            const heldSprite = heldEntry ? heldEntry.sprite : 'item_voiture';
            const heldSize = heldEntry ? heldEntry.size : 38;

            thrownItems.push({
                id: inventory.item,
                sprite: heldSprite,
                x: spawnX,
                y: spawnY,
                dx: throwDx * 9,
                dy: throwDy * 9,
                life: 55,
                size: heldSize,
                sliding: true,
                // In multi: who threw this. Used to set npc.angryAt correctly if the
                // item hits the NPC in flight OR lands on the floor and traps the NPC.
                // 'local' = me (this client). When the host throws, it's 'local'.
                // When the joiner throws, the host receives a ghost projectile (via
                // item_throw) — the host doesn't run collisions on ghosts, but if the
                // joiner's projectile drops to the floor on the joiner side, the
                // joiner sends request_drop which the host applies with 'remote'.
                thrownBy: 'local',
            });
            // Multi: notify the peer so they see the projectile fly.
            if (gameState.mode === 'multi' && net.conn && net.conn.open) {
                netSend({
                    type: 'item_throw',
                    id: inventory.item,
                    sprite: heldSprite,
                    x: spawnX, y: spawnY,
                    dx: throwDx * 9, dy: throwDy * 9,
                    size: heldSize,
                    life: 55,
                });
            }
            inventoryRemoveCurrent();
            inventory.showAnim = 0;
            inventory.showAnimActive = inventory.item !== null;
            broadcastSound('drop');

            // Throwing in front of an alert (yellow) NPC instantly triggers pursuit:
            // she saw the projectile fly past her face.
            // In multi: if we're not the host, send request_alert and let the host decide.
            if (gameState.mode === 'multi' && !net.isHost) {
                netSend({ type: 'request_alert', by: 'remote' });
            } else {
                for (const n of npcs) {
                    if (!n.patrol) continue;
                    // Use per-player vigilance in multi: she's "alert" toward THIS player only.
                    const vForUs = (gameState.mode === 'multi')
                        ? (n.vigilanceLocal || 'calm') // host's local view = the thrower
                        : n.vigilance;
                    if (vForUs !== 'alert') continue;
                    if (n.state === 'glisse' || n.state === 'tombe' || n.state === 'gifle') continue;
                    n.state = 'poursuit';
                    n.vigilance = 'angry';
                    n.angrySpeedTimer = 420;
                    n.angryAt = 'local'; // the thrower is the host's local
                    n.frame = 0; n.animTimer = 0;
                    n.path = null; n.pathRecalcTimer = 0;
                }
            }
            }
        }

        // Update thrown items
        for (let i = thrownItems.length - 1; i >= 0; i--) {
            const t = thrownItems[i];

            // Ghost projectiles (from peer): no collision, just animate and fade out.
            if (t.ghost) {
                if (t.sliding) {
                    t.x += t.dx;
                    t.y += t.dy;
                    t.life--;
                    t.dx *= 0.94;
                    t.dy *= 0.94;
                    if (t.life <= 0) {
                        thrownItems.splice(i, 1);
                    }
                }
                continue;
            }

            if (t.sliding) {
                // Step-by-step collision (check each pixel along path)
                const speed = Math.sqrt(t.dx * t.dx + t.dy * t.dy);
                const steps = Math.max(1, Math.ceil(speed));
                const stepDx = t.dx / steps;
                const stepDy = t.dy / steps;
                let hitWall = false;
                let hitNpc = false; // separate flag: NPC hit means item disappears, not lands

                for (let s = 0; s < steps; s++) {
                    const nx = t.x + stepDx;
                    const ny = t.y + stepDy;
                    // Full item hitbox (covers entire visual area)
                    const itemHb = { x: nx - 15, y: ny - 30, w: 30, h: 35 };
                    let blocked = false;
                    for (const c of getCurrentColliders()) {
                        if (rectsOverlap(itemHb, c)) { blocked = true; break; }
                    }
                    // Check NPC collision (any NPC currently active on this map)
                    if (!blocked) {
                        for (const npc of npcs) {
                            // Allow hits while sliding (to extend combo) but not while falling/slapping
                            if (npc.state === 'tombe' || npc.state === 'gifle') continue;
                            const npcHb = { x: npc.x - 20, y: npc.y - 20, w: 40, h: 30 };
                            if (rectsOverlap(itemHb, npcHb)) {
                                // In multi as joiner: ask the host to apply the hit; remove projectile locally
                                if (gameState.mode === 'multi' && !net.isHost) {
                                    netSend({
                                        type: 'request_hit_npc',
                                        itemId: t.id,
                                        dx: t.dx, dy: t.dy,
                                        thrownBy: 'remote', // from host's POV, the joiner is the remote
                                    });
                                    hitNpc = true;
                                    break;
                                }
                                const wasSliding = npc.state === 'glisse';
                                npc.state = 'glisse';
                                npc.slideKind = slideKindFor(t.dx, t.dy);
                                const gInfo = glisseSpriteFor(npc, npc.slideKind);
                                npc.currentSprite = gInfo.sprite;
                                npc.totalFrames = gInfo.frames;
                                if (!wasSliding) { npc.frame = 0; npc.animTimer = 0; }
                                npc.fps = 10;
                                const throwSpeed = Math.sqrt(t.dx * t.dx + t.dy * t.dy);
                                const norm = throwSpeed > 0 ? throwSpeed : 1;
                                npc.slideDx = (t.dx / norm) * 3;
                                npc.slideDy = (t.dy / norm) * 3;
                                npc.slideLife = 45;
                                npc.comboCount = (npc.comboCount || 0) + 1;
                                // Blame the actual thrower (in case projectile traveled off-screen
                                // and the wrong player would otherwise be assumed).
                                npc.angryAt = t.thrownBy || 'local';
                                if (t.dx !== 0) npc.facingLeft = t.dx < 0;
                                const entry = worldItems.find(w => w.id === t.id);
                                if (entry) {
                                    entry.picked = true;
                                    entry.respawnTimer = -1;
                                }
                                startGlisseSound();
                                hitNpc = true;
                                break;
                            }
                        }
                    }
                    if (hitNpc) break;
                    if (blocked) {
                        hitWall = true;
                        break;
                    }
                    t.x = nx;
                    t.y = ny;
                }

                if (hitNpc) {
                    // Item vanishes, do NOT add to worldItems on the floor
                    thrownItems.splice(i, 1);
                    continue;
                }

                if (hitWall) {
                    // Push item back a bit so it's clearly accessible
                    const pushBack = 5;
                    if (Math.abs(t.dx) > Math.abs(t.dy)) {
                        t.x -= Math.sign(t.dx) * pushBack;
                    } else {
                        t.y -= Math.sign(t.dy) * pushBack;
                    }
                    t.sliding = false;
                    const entry = worldItems.find(w => w.id === t.id);
                    if (entry) {
                        entry.x = t.x; entry.y = t.y;
                        entry.picked = false;
                        entry.respawnTimer = 0;
                        entry.dropped = true;
                        // Track who dropped/threw it — used to blame the right player
                        // when the NPC trips on this trap later.
                        entry.droppedBy = t.thrownBy || 'local';
                        if (gameState.mode === 'multi' && !net.isHost) {
                            entry._localDropCooldown = 60;
                            entry._netTargetX = t.x;
                            entry._netTargetY = t.y;
                            netSend({ type: 'request_drop', itemId: entry.id, x: t.x, y: t.y });
                        }
                    } else {
                        worldItems.push({
                            id: t.id, sprite: t.sprite,
                            x: t.x, y: t.y, size: t.size, picked: false,
                            spawnX: t.x, spawnY: t.y, respawnTimer: 0, dropped: true,
                            droppedBy: t.thrownBy || 'local',
                        });
                    }
                    thrownItems.splice(i, 1);
                    continue;
                }

                t.life--;
                t.dx *= 0.94;
                t.dy *= 0.94;
                if (t.life <= 0) {
                    t.sliding = false;
                    const entry = worldItems.find(w => w.id === t.id);
                    if (entry) {
                        entry.x = t.x; entry.y = t.y;
                        entry.picked = false;
                        entry.respawnTimer = 0;
                        entry.dropped = true;
                        entry.droppedBy = t.thrownBy || 'local';
                        if (gameState.mode === 'multi' && !net.isHost) {
                            entry._localDropCooldown = 60;
                            entry._netTargetX = t.x;
                            entry._netTargetY = t.y;
                            netSend({ type: 'request_drop', itemId: entry.id, x: t.x, y: t.y });
                        }
                    } else {
                        worldItems.push({
                            id: t.id, sprite: t.sprite,
                            x: t.x, y: t.y, size: t.size, picked: false,
                            spawnX: t.x, spawnY: t.y, respawnTimer: 0, dropped: true,
                            droppedBy: t.thrownBy || 'local',
                        });
                    }
                    thrownItems.splice(i, 1);
                }
            }
        }

        // Network ticks (multi only)
        netTickPlayer();
        netTickWorldState();
    }

    // ========== RENDER ==========
    function render() {
        const cw = canvas.width;
        const ch = canvas.height;
        const zoom = CONFIG.CAMERA_ZOOM;

        ctx.clearRect(0, 0, cw, ch);
        ctx.save();

        const viewW = cw / zoom;
        const viewH = ch / zoom;
        let camX = Math.max(viewW / 2, Math.min(CONFIG.MAP_W - viewW / 2, camera.x));
        let camY = Math.max(viewH / 2, Math.min(CONFIG.MAP_H - viewH / 2, camera.y));

        ctx.scale(zoom, zoom);
        ctx.translate(-camX + viewW / 2, -camY + viewH / 2);

        // Map
        const mapImg = currentMap === 'cuisine' ? images.map_cuisine : images.map;
        ctx.drawImage(mapImg, 0, 0, CONFIG.MAP_W, CONFIG.MAP_H);

        // ========== RENDER ALL ENTITIES (Y-sorted) ==========
        // Build list of all entities to render
        const entities = [];

        // Player entity
        entities.push({
            type: 'player',
            y: player.y,
            x: player.x,
        });

        // In kitchen map: only render the player + the kitchen NPC (no items, pickups, etc.)
        const isKitchen = currentMap === 'cuisine';

        // Remote player (multi only) — visible on both maps
        if (remotePlayer.active) {
            entities.push({
                type: 'remote_player',
                y: remotePlayer.y,
                x: remotePlayer.x,
            });
        }

        // NPC entities (maitresse in classroom, francois in kitchen)
        for (const npc of npcs) {
            entities.push({
                type: 'npc',
                y: npc.y,
                x: npc.x,
                npc: npc,
            });
        }

        // World items (not picked up) — visible on both maps
        for (const item of worldItems) {
            if (item.picked) continue;
            entities.push({
                type: 'world_item',
                y: item.y,
                x: item.x,
                item: item,
            });
        }

        // Health pickup (animated, 2 frames) — both maps
        if (!healthPickup.picked) {
            entities.push({
                type: 'health_pickup',
                y: healthPickup.y,
                x: healthPickup.x,
            });
        }

        if (!isKitchen) {

        // Exit arrow over the top-left door — classroom only
        entities.push({
            type: 'exit_arrow',
            y: exitArrow.y,
            x: exitArrow.x,
        });
        } // end if (!isKitchen)

        // Thrown items — both maps (Titeuf can throw items in the kitchen too)
        for (const t of thrownItems) {
            entities.push({
                type: 'thrown_item',
                y: t.y,
                x: t.x,
                thrown: t,
            });
        }

        // Sort by Y (feet position) — lower Y drawn first (behind)
        entities.sort((a, b) => a.y - b.y);

        // Render each entity
        for (const ent of entities) {
            if (ent.type === 'player') {
                // Shadow
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(player.x, player.y + 5, P_RENDER_W * 0.35, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Sprite
                let spriteImg;
                let pCols = CONFIG.SPRITE_COLS;
                let pCellW = CONFIG.SPRITE_CELL_W;
                let pCellH = CONFIG.SPRITE_CELL_H;
                let pTotalFrames = ANIM_FRAMES[player.currentAnim] || 5;
                if (player.currentAnim === 'gifle') {
                    spriteImg = images.titeuf_gifle;
                    pCols = 4; pTotalFrames = 3;
                } else {
                    spriteImg = images[player.currentAnim];
                }
                const col = player.frame % pCols;
                const row = Math.floor(player.frame / pCols);
                const srcX = col * pCellW;
                const srcY = row * pCellH;

                ctx.save();
                ctx.translate(player.x, player.y);
                const noFlip = player.currentAnim === 'idle_down' || player.currentAnim === 'idle_up' || player.currentAnim === 'run_down' || player.currentAnim === 'run_up' || player.currentAnim === 'panique_haut' || player.currentAnim === 'panique_bas';
                if (!noFlip && player.facingLeft) {
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(
                    spriteImg,
                    srcX, srcY, CONFIG.SPRITE_CELL_W, CONFIG.SPRITE_CELL_H,
                    -P_RENDER_W / 2, -P_RENDER_H + 12,
                    P_RENDER_W, P_RENDER_H
                );
                ctx.restore();

            } else if (ent.type === 'remote_player') {
                // Shadow
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(remotePlayer.x, remotePlayer.y + 5, P_RENDER_W * 0.35, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Sprite (same logic as local player but reads remotePlayer fields)
                let rSpriteImg;
                let rCols = CONFIG.SPRITE_COLS;
                let rCellW = CONFIG.SPRITE_CELL_W;
                let rCellH = CONFIG.SPRITE_CELL_H;
                const rAnim = remotePlayer.currentAnim || 'idle';
                if (rAnim === 'gifle') {
                    rSpriteImg = images.titeuf_gifle;
                    rCols = 4;
                } else {
                    rSpriteImg = images[rAnim] || images.idle;
                }
                if (!rSpriteImg) continue;
                const rCol = remotePlayer.frame % rCols;
                const rRow = Math.floor(remotePlayer.frame / rCols);
                const rSrcX = rCol * rCellW;
                const rSrcY = rRow * rCellH;

                ctx.save();
                ctx.translate(remotePlayer.x, remotePlayer.y);
                const rNoFlip = rAnim === 'idle_down' || rAnim === 'idle_up' || rAnim === 'run_down' || rAnim === 'run_up' || rAnim === 'panique_haut' || rAnim === 'panique_bas';
                if (!rNoFlip && remotePlayer.facingLeft) {
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(
                    rSpriteImg,
                    rSrcX, rSrcY, CONFIG.SPRITE_CELL_W, CONFIG.SPRITE_CELL_H,
                    -P_RENDER_W / 2, -P_RENDER_H + 12,
                    P_RENDER_W, P_RENDER_H
                );
                ctx.restore();

            } else if (ent.type === 'npc') {
                const npc = ent.npc;
                const npcImg = images[npc.currentSprite || npc.sprites?.idle || npc.sprite];
                if (!npcImg) continue;
                const nCol = npc.frame % npc.cols;
                const nRow = Math.floor(npc.frame / npc.cols);
                const nSrcX = nCol * npc.cellW;
                const nSrcY = nRow * npc.cellH;
                const nRW = npc.cellW * npc.scale;
                const nRH = npc.cellH * npc.scale;

                // Shadow (aligned with feet)
                const oY = npc.offsetY || 12;
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(npc.x, npc.y + oY, nRW * 0.3, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Sprite
                ctx.save();
                ctx.translate(npc.x, npc.y);
                const cs = npc.currentSprite || '';
                // Vertical-only sprites: never flip horizontally.
                // We must NOT match the diagonal sprites here (they share the haut/bas suffix
                // but represent left/right facings and need flipping).
                const isVerticalOnly =
                    cs.includes('walk_down') ||
                    cs.includes('walk_up') ||
                    (cs.includes('glisse_haut') && !cs.includes('glisse_diag_haut')) ||
                    (cs.includes('glisse_bas') && !cs.includes('glisse_diag_bas')) ||
                    (cs.includes('tombe_haut') && !cs.includes('tombe_diag_haut')) ||
                    (cs.includes('tombe_bas') && !cs.includes('tombe_diag_bas')) ||
                    (cs.includes('poursuit_bas') && !cs.includes('poursuit_diag_bas')) ||
                    (cs.includes('poursuit_haut') && !cs.includes('poursuit_diag_haut'));
                const npcNoFlip = isVerticalOnly;
                if (!npcNoFlip && npc.facingLeft) {
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(
                    npcImg,
                    nSrcX, nSrcY, npc.cellW, npc.cellH,
                    -nRW / 2, -nRH + oY,
                    nRW, nRH
                );
                ctx.restore();
            } else if (ent.type === 'world_item') {
                const item = ent.item;
                const itemImg = images[item.sprite];
                if (!itemImg) continue;
                const s = item.size;
                // Shadow
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(item.x, item.y + 5, s * 0.3, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // Item sprite (no floating)
                ctx.drawImage(itemImg, item.x - s / 2, item.y - s + 10, s, s);

            } else if (ent.type === 'thrown_item') {
                const t = ent.thrown;
                const tImg = images[t.sprite];
                if (!tImg) continue;
                ctx.drawImage(tImg, t.x - t.size / 2, t.y - t.size / 2, t.size, t.size);

            } else if (ent.type === 'health_pickup') {
                // Sprite is 64x16 but content is 2 frames of 16x16 side-by-side.
                const frame = Math.floor(Date.now() / 250) % 2;
                const srcW = 16, srcH = 16;
                const renderW = healthPickup.size;
                const renderH = healthPickup.size;
                // Shadow
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(healthPickup.x, healthPickup.y + 5, renderW * 0.3, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.drawImage(
                    images.item_hp,
                    frame * srcW, 0, srcW, srcH,
                    healthPickup.x - renderW / 2, healthPickup.y - renderH + 8, renderW, renderH
                );

            } else if (ent.type === 'exit_arrow') {
                // Grey static arrow until score >= 8, then yellow animated 4-frame sheet.
                const size = exitArrow.size;
                const x = exitArrow.x - size / 2;
                const y = exitArrow.y - size / 2;
                if (player.score >= 8) {
                    // Animated 4 frames, 8 fps (each frame = 7.5 game frames)
                    exitArrow.animTimer = (exitArrow.animTimer || 0) + 1;
                    if (exitArrow.animTimer >= 8) {
                        exitArrow.animTimer = 0;
                        exitArrow.frame = (exitArrow.frame + 1) % 4;
                    }
                    ctx.drawImage(
                        images.fleche_jaune,
                        exitArrow.frame * 32, 0, 32, 32,
                        x, y, size, size
                    );
                } else {
                    ctx.drawImage(images.fleche, x, y, size, size);
                }
            }
        }

        // ========== VIGILANCE DOTS (world space, above NPC heads) ==========
        for (const npc of npcs) {
            if (!npc.vigilanceRadius) continue;
            if (npc.state === 'tombe' || npc.state === 'glisse') continue; // no dot when down
            const nRH = npc.cellH * npc.scale;
            const oY = npc.offsetY || 12;
            const dotImg = npc.vigilance === 'angry' ? images.point_rouge
                         : npc.vigilance === 'alert' ? images.point_jaune
                         : images.point_bleu;
            const dotX = npc.x;
            // Each NPC can override the default offset (-20) via vigilanceDotOffset.
            // Useful when the sprite has more/less empty space above the head.
            const dotOffset = npc.vigilanceDotOffset !== undefined ? npc.vigilanceDotOffset : -20;
            const dotY = npc.y - nRH + oY + dotOffset;

            // Si CE PNJ poursuit MON joueur local : on affiche le point d'exclamation
            // a la place du point de vigilance. Sinon : point de vigilance normal.
            // En multi, l'autre joueur (non poursuivi) verra le point rouge classique
            // car pour lui getChaseTarget(npc) !== son player local.
            const isChasingMe = npc.state === 'poursuit' && getChaseTarget(npc) === player;
            const renderImg = isChasingMe ? images.point_excla : dotImg;

            if (renderImg && renderImg.complete && renderImg.naturalWidth) {
                // Image native 32x16 -> rendu agrandi pour bonne visibilite
                const dw = 56, dh = 28;
                ctx.save();
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(renderImg, Math.round(dotX - dw / 2), Math.round(dotY - dh / 2), dw, dh);
                ctx.restore();
            }
        }

        // ========== CONFUSION STARS (PNJ a terre, etat 'tombe') ==========
        // Animation 4 frames 32x32 jouee en boucle uniquement quand la maitresse
        // est totalement a terre (derniere frame de l'anim de chute = frame 5).
        // L'etat 'tombe' et 'frame' sont synchronises via world_state, donc tous
        // les clients (solo / host / joiner) voient l'animation de facon coherente.
        for (const npc of npcs) {
            if (npc.state !== 'tombe') continue;
            // Wait until the fall animation reached its last frame.
            const tombeFrames = npc.tombeFrames || 6;
            if (npc.frame < tombeFrames - 1) continue;
            const starsImg = images.confusion_etoiles;
            if (!starsImg || !starsImg.complete || !starsImg.naturalWidth) continue;
            // Anim: 8 fps, 4 frames, en boucle (timing base sur Date.now pour rester
            // independant de la frame courante du sprite NPC qui elle est gelee)
            const frameIdx = Math.floor(Date.now() / 125) % 4;
            const FRAME_W = 32, FRAME_H = 32;
            const dw = 64, dh = 32; // rendu agrandi pour visibilite
            const sx = frameIdx * FRAME_W;
            const cx = npc.x;
            // PNJ a terre : sa "tete couchee" est juste au-dessus de npc.y.
            const cy = npc.y - 60;
            ctx.save();
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(
                starsImg,
                sx, 0, FRAME_W, FRAME_H,
                Math.round(cx - dw / 2), Math.round(cy - dh / 2), dw, dh
            );
            ctx.restore();
        }

        // DEBUG (uncomment to debug)
        /*
        ctx.save();
        ctx.strokeStyle = 'rgba(255,0,0,0.5)';
        ctx.lineWidth = 1;
        for (const c of getCurrentColliders()) ctx.strokeRect(c.x, c.y, c.w, c.h);
        const hb = playerHitbox(player.x, player.y);
        ctx.strokeStyle = 'rgba(0,255,0,0.8)';
        ctx.strokeRect(hb.x, hb.y, hb.w, hb.h);
        ctx.restore();
        */

        // Score popup over Titeuf's head (in world space, inside camera transform)
        function drawScorePopup(ent) {
            if (!ent.scorePopup) return;
            const total = 180;
            const t = ent.scorePopup.timer / total;
            const progress = 1 - t;
            const yOffset = -72 - progress * 18;
            const alpha = t < 0.25 ? t * 4 : 1;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 14px "Comic Sans MS", cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000';
            ctx.fillStyle = '#FFFFFF';
            const px = ent.x;
            const py = ent.y + yOffset;
            ctx.strokeText(ent.scorePopup.text, px, py);
            ctx.fillText(ent.scorePopup.text, px, py);
            ctx.restore();
        }
        drawScorePopup(player);
        if (remotePlayer.active) drawScorePopup(remotePlayer);

        ctx.restore();

        // ========== OFF-SCREEN NPC INDICATORS ==========
        for (const npc of npcs) {
            if (!npc.vigilanceRadius) continue;
            if (npc.state === 'tombe' || npc.state === 'glisse') continue;
            const isChasingMe = npc.state === 'poursuit' && getChaseTarget(npc) === player;
            const dotImg = isChasingMe ? images.point_excla
                         : npc.vigilance === 'angry' ? images.point_rouge
                         : npc.vigilance === 'alert' ? images.point_jaune
                         : images.point_bleu;

            // Convert NPC world pos to screen pos
            const screenX = (npc.x - camX + viewW / 2) * zoom;
            const screenY = (npc.y - camY + viewH / 2) * zoom;

            const margin = 20;
            const hudBottom = ch - 80 - 20; // above HUD bar
            const isOffScreen = screenX < -margin || screenX > cw + margin ||
                                screenY < -margin || screenY > hudBottom + margin;

            if (isOffScreen) {
                // Clamp to screen edges, Y stops above HUD bar
                const clampX = Math.max(margin, Math.min(cw - margin, screenX));
                const clampY = Math.max(margin, Math.min(hudBottom, screenY));

                if (dotImg && dotImg.complete && dotImg.naturalWidth) {
                    // Indicateur off-screen agrandi pour rester bien visible au bord
                    const dw = 128, dh = 64;
                    ctx.save();
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(dotImg, Math.round(clampX - dw / 2), Math.round(clampY - dh / 2), dw, dh);
                    ctx.restore();
                }
            }
        }

        // ========== HUD BAR ==========
        const hudH = 80;
        const hudY = ch - hudH;

        // Purple bar background
        ctx.fillStyle = '#2a0845';
        ctx.fillRect(0, hudY, cw, hudH);
        // Gold top border
        ctx.fillStyle = '#c8a800';
        ctx.fillRect(0, hudY, cw, 5);

        ctx.imageSmoothingEnabled = false;

        // Titeuf head (left side) - blinks when hit, sprite changes with HP
        const headSize = 190;
        const headX = 8;
        const headY = hudY + (hudH - headSize) / 2 - 60;
        const showHead = player.headBlink <= 0 || Math.floor(player.headBlink / 8) % 2 === 0;
        if (showHead) {
            let headImg = images.hud_tete;
            if (player.health === 2) headImg = images.hud_tete_2hp;
            else if (player.health <= 1) headImg = images.hud_tete_1hp;
            ctx.drawImage(headImg, headX, headY, headSize, headSize);
        }

        // Stars (point de vie) - only show remaining health
        const starSize = 96;
        const starStartX = headX + headSize + 16;
        const starY = hudY + (hudH - starSize) / 2 + 4;
        for (let i = 0; i < player.health; i++) {
            ctx.drawImage(images.hud_vie, starStartX + i * (starSize + 8), starY, starSize, starSize);
        }

        // Trophy + score (right area)
        const coupeSize = 56;
        const coupeX = cw * 0.65;
        const coupeY = hudY + (hudH - coupeSize) / 2 + 4;
        // Score text (left of trophy)
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 44px "Comic Sans MS", cursive';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(player.score), coupeX - 10, hudY + hudH / 2 + 4);
        // Trophy
        ctx.drawImage(images.hud_coupe, coupeX, coupeY, coupeSize, coupeSize);

        // ========== INVENTORY ICON (bottom right, above HUD bar) ==========
        if (inventory.item || inventory.showAnimActive) {
            const invSize = 180;
            const invX = cw - invSize - 20;
            // Slide from below HUD bar to above it
            const targetY = hudY - invSize - 8;
            const startY = ch + invSize;
            const t = inventory.showAnim;
            // Ease out
            const eased = 1 - Math.pow(1 - t, 3);
            const invY = startY + (targetY - startY) * eased;

            // Item icon — choose sprite based on what Titeuf actually holds
            ctx.imageSmoothingEnabled = false;
            const invEntry = worldItems.find(w => w.id === inventory.item);
            const invImg = invEntry ? images[invEntry.sprite] : images.item_voiture;
            if (invImg) ctx.drawImage(invImg, invX, invY, invSize, invSize);
        }

        // ========== PANIQUE BUTTON INDICATOR (top right) ==========
        if (player.panique) {
            // Sprite is 64x32 but the actual content is 2 frames of 16x32 side-by-side:
            //   frame 0: button B alone, frame 1: button B with arrow (pressed).
            const btnFrame = Math.floor(Date.now() / 100) % 2;
            const srcW = 16, srcH = 32;
            // Render at 7x scale to be highly visible
            const renderW = srcW * 7;  // 112
            const renderH = srcH * 7;  // 224
            const btnX = cw - renderW - 24;
            const btnY = 24;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(
                images.hud_button_a,
                btnFrame * srcW, 0, srcW, srcH,
                btnX, btnY, renderW, renderH
            );
        }
    }

    // ========== RESIZE ==========
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
        // Adaptive zoom: ensure a minimum world viewport so the game stays playable
        // on small screens. Targets at least 280x200 world units visible.
        const MIN_VIEW_W = 280;
        const MIN_VIEW_H = 200;
        const targetZoom = 3.4;
        const maxZoomW = canvas.width / MIN_VIEW_W;
        const maxZoomH = canvas.height / MIN_VIEW_H;
        CONFIG.CAMERA_ZOOM = Math.min(targetZoom, maxZoomW, maxZoomH);
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 100));

    // ========== GAME LOOP ==========
    const FRAME_TIME = 1000 / 60;
    let accumulator = 0;

    // ========== MENU & DEFI SCREENS ==========
    // Track edge-press state for navigation buttons
    const screenInput = {
        aPrev: false,
        bPrev: false,
        upPrev: false,
        downPrev: false,
    };
    function pollScreenInput() {
        // Read raw input (poll gamepad first)
        pollGamepad();
        const aDown = !!keys['KeyA'] || !!gamepad.a;
        // B button: keyboard B + gamepad B (button 1 in standard mapping)
        const gp = navigator.getGamepads ? navigator.getGamepads()[0] : null;
        const gpBPressed = gp && gp.buttons[1] && gp.buttons[1].pressed;
        const bDown = !!keys['KeyB'] || gpBPressed;
        const upDown = !!keys['ArrowUp'] || !!keys['KeyZ'] || gamepad.dpad.up || gamepad.ly < -DEADZONE;
        const downDown = !!keys['ArrowDown'] || !!keys['KeyS'] || gamepad.dpad.down || gamepad.ly > DEADZONE;
        const result = {
            aPressed: aDown && !screenInput.aPrev,
            bPressed: bDown && !screenInput.bPrev,
            upPressed: upDown && !screenInput.upPrev,
            downPressed: downDown && !screenInput.downPrev,
        };
        screenInput.aPrev = aDown;
        screenInput.bPrev = bDown;
        screenInput.upPrev = upDown;
        screenInput.downPrev = downDown;
        return result;
    }

    function updateMenu(dt) {
        const inp = pollScreenInput();
        if (inp.upPressed) gameState.menuSelection = Math.max(0, gameState.menuSelection - 1);
        if (inp.downPressed) gameState.menuSelection = Math.min(1, gameState.menuSelection + 1);
        if (inp.aPressed) {
            if (gameState.menuSelection === 0) {
                // Solo: go to defi screen, restart music from start
                gameState.mode = 'solo';
                gameState.screen = 'defi';
                gameState.defiAnim = 0;
                gameState.defiSelfReady = false;
                restartMusicFromStart();
            } else {
                // Multijoueur: open nickname modal
                gameState.mode = 'multi';
                openNicknameModal();
            }
        }
    }

    function updateLobby(dt) {
        const inp = pollScreenInput();
        // Host can press A to start the defi screen once a peer is connected
        if (net.isHost && net.connected && inp.aPressed) {
            netSend({ type: 'start_defi' });
            gameState.screen = 'defi';
            gameState.defiAnim = 0;
            gameState.defiSelfReady = false;
            gameState.defiReadyCount = 0;
            restartMusicFromStart();
        }
        // B returns to menu and cleans up the network
        if (inp.bPressed) {
            cleanupNet();
            gameState.screen = 'menu';
        }
    }

    function updateDefi(dt) {
        const inp = pollScreenInput();
        if (gameState.defiAnim < 1) {
            gameState.defiAnim = Math.min(1, gameState.defiAnim + 1 / 30);
        }
        if (gameState.mode === 'solo') {
            if (inp.aPressed && gameState.defiAnim >= 1) {
                startGame();
            }
            if (inp.bPressed && gameState.defiAnim >= 1) {
                gameState.screen = 'menu';
            }
        } else {
            // Multi: wait for both players to press A
            if (inp.aPressed && gameState.defiAnim >= 1 && !gameState.defiSelfReady) {
                gameState.defiSelfReady = true;
                if (net.isHost) {
                    gameState.defiReadyCount = Math.min(2, gameState.defiReadyCount + 1);
                    if (gameState.defiReadyCount >= 2) {
                        netSend({ type: 'start_game' });
                        startGame();
                    }
                } else {
                    // Joiner notifies host
                    netSend({ type: 'defi_ready' });
                }
            }
            // B in multi: bail back to menu (and disconnect)
            if (inp.bPressed && gameState.defiAnim >= 1) {
                cleanupNet();
                gameState.screen = 'menu';
            }
        }
    }

    function renderMenu() {
        const cw = canvas.width, ch = canvas.height;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, cw, ch);
        const bg = images.menu_bg;
        if (!bg || !bg.complete) return;

        // Fit to canvas while preserving aspect ratio (cover)
        const ratio = Math.max(cw / bg.width, ch / bg.height);
        const dw = bg.width * ratio;
        const dh = bg.height * ratio;
        const dx = (cw - dw) / 2;
        const dy = (ch - dh) / 2;
        ctx.drawImage(bg, dx, dy, dw, dh);

        // Selection boxes positioned in the image's own coordinate system,
        // then mapped to canvas via the same (dx,dy,ratio) transform.
        // Calibrated against the menu.png layout (text positions in source image).
        // Image-space rectangle for "MODE SOLO":
        // Each option has its own rectangle so different text widths can be framed properly.
        const imgBoxH = bg.height * 0.11;
        // MODE SOLO (shorter)
        const soloBoxX = bg.width * 0.46;
        const soloBoxW = bg.width * 0.34;
        const soloBoxY = bg.height * 0.57;
        // MULTIJOUEUR (longer)
        const multiBoxX = bg.width * 0.40;
        const multiBoxW = bg.width * 0.44;
        const multiBoxY = bg.height * 0.68;

        const sel = gameState.menuSelection === 0
            ? { x: soloBoxX, y: soloBoxY, w: soloBoxW, h: imgBoxH }
            : { x: multiBoxX, y: multiBoxY, w: multiBoxW, h: imgBoxH };

        // Map to canvas coordinates
        const boxX = dx + sel.x * ratio;
        const boxY = dy + sel.y * ratio;
        const boxW = sel.w * ratio;
        const boxH = sel.h * ratio;

        ctx.save();
        const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
        ctx.strokeStyle = '#5a2a8c';
        ctx.lineWidth = 6 * pulse;
        ctx.shadowColor = 'rgba(90, 42, 140, 0.6)';
        ctx.shadowBlur = 16 * pulse;
        const r = 12;
        ctx.beginPath();
        ctx.moveTo(boxX + r, boxY);
        ctx.lineTo(boxX + boxW - r, boxY);
        ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + r);
        ctx.lineTo(boxX + boxW, boxY + boxH - r);
        ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - r, boxY + boxH);
        ctx.lineTo(boxX + r, boxY + boxH);
        ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - r);
        ctx.lineTo(boxX, boxY + r);
        ctx.quadraticCurveTo(boxX, boxY, boxX + r, boxY);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }

    function renderLobby() {
        const cw = canvas.width, ch = canvas.height;
        // Background
        ctx.fillStyle = '#f4c41e';
        ctx.fillRect(0, 0, cw, ch);
        // Orange band at the top
        ctx.fillStyle = '#e8a017';
        ctx.fillRect(0, 0, cw, ch * 0.13);

        // Title
        ctx.fillStyle = '#5a2a8c';
        ctx.font = 'bold ' + Math.floor(ch * 0.07) + 'px "Comic Sans MS", cursive';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('RECHERCHE RAPIDE', cw / 2, ch * 0.065);

        // Status message (search progress)
        ctx.font = 'bold ' + Math.floor(ch * 0.035) + 'px "Comic Sans MS", cursive';
        ctx.fillStyle = '#5a2a8c';
        const dots = '.'.repeat(Math.floor(Date.now() / 400) % 4);
        let statusText = net.searchMessage;
        if (net.searchStatus === 'searching' || net.searchStatus === 'hosting' || net.searchStatus === 'connecting') {
            statusText = statusText + dots;
        }
        ctx.fillText(statusText, cw / 2, ch * 0.20);

        // Player list (2 rows)
        const listY = ch * 0.30;
        const rowH = ch * 0.12;
        const listW = Math.min(cw * 0.7, 700);
        const listX = (cw - listW) / 2;
        const players = [
            { nickname: net.nickname || 'Toi', present: true, isHost: net.isHost },
            { nickname: net.connected ? (net.peerNickname || 'Joueur 2') : '', present: net.connected, isHost: !net.isHost && net.connected },
        ];
        // If host hasn't matched yet, first row is always us
        if (!net.isHost && net.connected) {
            // Joiner: peer (the host) goes first
            players[0] = { nickname: net.peerNickname || 'Joueur 1', present: true, isHost: true };
            players[1] = { nickname: net.nickname || 'Toi', present: true, isHost: false };
        }

        for (let i = 0; i < 2; i++) {
            const p = players[i];
            const ry = listY + i * (rowH + 8);
            // Row background
            ctx.fillStyle = p.present ? '#fff4b8' : '#e8c878';
            ctx.strokeStyle = '#5a2a8c';
            ctx.lineWidth = 3;
            roundRect(ctx, listX, ry, listW, rowH, 12);
            ctx.fill();
            ctx.stroke();

            // Avatar (titeuf head)
            const avSize = rowH * 0.85;
            const avX = listX + 10;
            const avY = ry + (rowH - avSize) / 2;
            if (p.present && images.hud_tete) {
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(images.hud_tete, avX, avY, avSize, avSize);
            } else {
                ctx.fillStyle = '#cca830';
                ctx.fillRect(avX, avY, avSize, avSize);
            }

            // Nickname
            ctx.font = 'bold ' + Math.floor(rowH * 0.42) + 'px "Comic Sans MS", cursive';
            ctx.fillStyle = '#5a2a8c';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const nickX = avX + avSize + 20;
            ctx.fillText(p.present ? p.nickname : 'En attente...', nickX, ry + rowH / 2);

            // Host badge
            if (p.present && p.isHost) {
                ctx.font = 'bold ' + Math.floor(rowH * 0.28) + 'px "Comic Sans MS", cursive';
                ctx.fillStyle = '#c00';
                ctx.textAlign = 'right';
                ctx.fillText('HOTE', listX + listW - 20, ry + rowH / 2);
            }
        }

        // Bottom instructions
        ctx.font = 'bold ' + Math.floor(ch * 0.03) + 'px "Comic Sans MS", cursive';
        ctx.fillStyle = '#5a2a8c';
        ctx.textAlign = 'center';
        if (net.isHost && net.connected) {
            ctx.fillText('Appuie sur A pour d\u00e9marrer  \u2014  B pour annuler', cw / 2, ch * 0.90);
        } else if (net.connected) {
            ctx.fillText('En attente de l\u2019h\u00f4te  \u2014  B pour annuler', cw / 2, ch * 0.90);
        } else {
            ctx.fillText('B pour annuler', cw / 2, ch * 0.90);
        }
    }

    // Helper for rounded rect (used by lobby)
    function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y);
        c.lineTo(x + w - r, y);
        c.quadraticCurveTo(x + w, y, x + w, y + r);
        c.lineTo(x + w, y + h - r);
        c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        c.lineTo(x + r, y + h);
        c.quadraticCurveTo(x, y + h, x, y + h - r);
        c.lineTo(x, y + r);
        c.quadraticCurveTo(x, y, x + r, y);
        c.closePath();
    }

    function renderDefi() {
        const cw = canvas.width, ch = canvas.height;
        ctx.fillStyle = '#f4c41e'; // match defi page background
        ctx.fillRect(0, 0, cw, ch);
        const bg = images.defi_bg;
        if (bg && bg.complete) {
            // Slide down animation: panel falls from above
            const ease = 1 - Math.pow(1 - gameState.defiAnim, 3); // ease-out cubic
            const ratio = Math.max(cw / bg.width, ch / bg.height);
            const dw = bg.width * ratio;
            const dh = bg.height * ratio;
            const finalY = (ch - dh) / 2;
            const startY = -dh;
            const dy = startY + (finalY - startY) * ease;
            ctx.drawImage(bg, (cw - dw) / 2, dy, dw, dh);
        }
    }

    // ========== VICTOIRE SCREEN ==========
    function updateVictoire(dt) {
        if (gameState.victoireAnim < 1) {
            gameState.victoireAnim = Math.min(1, gameState.victoireAnim + 1 / 30);
        }
        // Press A after animation completes -> go to kitchen map (together in multi).
        // Press B -> back to menu (also notifies the peer in multi).
        const inp = pollScreenInput();
        if (inp.aPressed && gameState.victoireAnim >= 1) {
            startCuisine(true);
        } else if (inp.bPressed && gameState.victoireAnim >= 1) {
            // Tell peer to go back to menu too before tearing down the connection
            if (gameState.mode === 'multi' && net.conn && net.conn.open) {
                try { netSend({ type: 'goto_menu_from_cuisine' }); } catch (_) {}
                cleanupNet();
            }
            currentMap = 'classe';
            setActiveNpcForMap('classe');
            remotePlayer.active = false;
            gameState.screen = 'menu';
            restartMusicFromStart();
        }
    }

    function renderVictoire() {
        const cw = canvas.width, ch = canvas.height;
        ctx.fillStyle = '#f4c41e';
        ctx.fillRect(0, 0, cw, ch);
        const bg = images.victoire_bg;
        if (bg && bg.complete) {
            // Slide down animation (same easing as defi)
            const ease = 1 - Math.pow(1 - gameState.victoireAnim, 3);
